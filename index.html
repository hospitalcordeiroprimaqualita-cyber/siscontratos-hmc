              </div>
              <div style={{padding:'10px 14px'}}>
                <div style={{fontSize:11,fontWeight:700,color:'#991b1b',marginBottom:6}}>ITENS EM FALTA — de onde cobrir</div>
                {deficit.map((d,i) => (
                  <div key={i} style={{padding:'6px 0',borderBottom:i<deficit.length-1?'1px solid var(--gray-b)':'none'}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:12}}>
                      <span style={{fontWeight:600}}>{d.item.item}{d.item.lote && <span style={{fontWeight:400,color:'var(--text3)'}}> · Lote {d.item.lote}</span>}</span>
                      <span style={{color:'#b91c1c',fontWeight:600}}>faltam {Math.abs(d.dif)} un. · {brl(d.valor)}</span>
                    </div>
                    {d.origens.length>0 && (
                      <div style={{marginTop:3,paddingLeft:12,fontSize:11.5,color:'#92400e'}}>
                        {d.origens.map((o,j) => (
                          <div key={j}>↳ cobrir com <strong>{o.itemSobra.item}</strong> — usar {o.qtdSobra.toFixed(1)} un. da sobra ({brl(o.valor)})</div>
                        ))}
                      </div>
                    )}
                    {d.faltaCobrir > 0.01 && (
                      <div style={{marginTop:3,paddingLeft:12,fontSize:11.5,color:'#b91c1c',fontWeight:600}}>
                        ↳ sem cobertura suficiente no contrato — falta {brl(d.faltaCobrir)} em aditivo real
                      </div>
                    )}
                  </div>
                ))}
                {valorAditivoNecessario > 0.01 && (
                  <div style={{marginTop:10,padding:'10px 12px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:6}}>
                    <div style={{fontSize:11,fontWeight:700,color:'#991b1b',marginBottom:5}}>
                      {totalSobra>0 ? 'O reequilíbrio interno não cobre tudo — gerar aditivo pelo valor necessário nos itens abaixo:' : 'Este contrato não tem sobra pra reequilibrar — gerar aditivo pelo valor necessário nos itens abaixo:'}
                    </div>
                    {deficit.filter(d=>d.faltaCobrir>0.01).map((d,i) => (
                      <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:11.5,padding:'2px 0'}}>
                        <span>{d.item.item}{d.item.lote && ` · Lote ${d.item.lote}`}</span>
                        <span style={{fontWeight:600,color:'#b91c1c'}}>{brl(d.faltaCobrir)}</span>
                      </div>
                    ))}
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,paddingTop:5,marginTop:4,borderTop:'1px solid #fecaca',fontWeight:700}}>
                      <span>Total do aditivo necessário</span><span style={{color:'#b91c1c'}}>{brl(valorAditivoNecessario)}</span>
                    </div>
                  </div>
                )}
                <div style={{marginTop:10,display:'flex',gap:8,flexWrap:'wrap'}}>
                  {podeReequilibrar ? (
                    <>
                      <button className="btn btn-primary btn-sm" onClick={() => gerarPedidoReequilibrio(contrato, deficit, superavit)}>
                        <i className="fa-solid fa-file-pdf"/> Gerar Pedido de Reequilíbrio
                      </button>
                      <button className="btn btn-secondary btn-sm" onClick={() => { setFiltroAditivoContrato(contrato.id); openModal('aditivo'); }}>
                        <i className="fa-solid fa-arrow-right-arrow-left"/> Registrar redistribuição quantitativa
                      </button>
                    </>
                  ) : (
                    <>
                      {totalSobra > 0 && (
                        <button className="btn btn-secondary btn-sm" onClick={() => gerarPedidoReequilibrio(contrato, deficit, superavit)}>
                          <i className="fa-solid fa-file-pdf"/> Gerar Pedido de Reequilíbrio (cobertura parcial)
                        </button>
                      )}
                      <button className="btn btn-primary btn-sm" onClick={() => gerarPedidoAditivo(contrato, deficit.filter(d=>d.faltaCobrir>0.01), valorAditivoNecessario)}>
                        <i className="fa-solid fa-file-pdf"/> Gerar Pedido de Aditivo
                      </button>
                      <button className="btn btn-danger btn-sm" onClick={() => { setFiltroAditivoContrato(contrato.id); openModal('aditivo'); }}>
                        <i className="fa-solid fa-triangle-exclamation"/> Registrar solicitação de aditivo ({brl(valorAditivoNecessario)})
                      </button>
                    </>
                  )}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    )}

    <div className="panel">
      <div className="panel-head"><h2><i className="fa-solid fa-file-pen" /> Aditivos e supressões registrados</h2>
        <button className="btn btn-primary btn-sm" onClick={() => openModal('aditivo')}><i className="fa-solid fa-plus" /> Registrar</button>
      </div>
      <div className="panel-body" style={{paddingBottom:8}}>
        <div className="form-row" style={{marginBottom:0}}>
          <div className="form-group">
            <label>Filtrar por contrato</label>
            <select value={filtroAditivoContrato} onChange={e => setFiltroAditivoContrato(e.target.value)}>
              <option value="">— Todos os contratos ({aditivos.length} registros) —</option>
              {contratosComAditivo.map(c => {
                const qtd = aditivos.filter(a => a.contrato_id === c.id).length;
                return <option key={c.id} value={c.id}>{c.numero} · {c.empresa.substring(0,30)} ({qtd})</option>;
              })}
            </select>
          </div>
          <div className="form-group">
            <label>Buscar (contrato, empresa, tipo, justificativa...)</label>
            <input type="text" placeholder="Digite para buscar..." value={buscaAditivo} onChange={e => setBuscaAditivo(e.target.value)} />
          </div>
        </div>
      </div>
      <div className="tbl-wrap">
        <table><thead><tr><th>ID</th><th>Contrato</th><th>Tipo</th><th>Data</th><th>Vlr acrescido</th><th>Vlr suprimido</th><th>Novo prazo</th><th>Status</th><th>Obs.</th><th></th></tr></thead>
        <tbody>{listaFiltrada.map(a => {
          const c = contratos.find(x => x.id === a.contrato_id);
          const cls = {Aprovado:'verde','Em análise':'amarelo',Indeferido:'vermelho',Encerrado:'cinza'}[a.status]||'cinza';
          return (
            <tr key={a.id}>
              <td className="mono">{a.id?.substring(0,8)}</td>
              <td className="mono">{c?.numero || '—'}</td>
              <td style={{maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.tipo}</td>
              <td className="cell-m">{fmtD(a.data)}</td>
              <td>{a.vlr_acrescido > 0 ? brl(a.vlr_acrescido) : '—'}</td>
              <td>{a.vlr_suprimido > 0 ? brl(a.vlr_suprimido) : '—'}</td>
              <td className="cell-m">{a.novo_prazo ? fmtD(a.novo_prazo) : '—'}</td>
              <td><Badge cls={cls} label={a.status} /></td>
              <td className="cell-m" style={{maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.obs || '—'}</td>
              <td><ActBtn icon="fa-trash" onClick={() => excluir('aditivos', a.id)} danger /></td>
            </tr>
          );
        })}</tbody></table>
        {listaFiltrada.length === 0 && <div className="empty"><i className="fa-solid fa-magnifying-glass"/>Nenhum aditivo encontrado com esse filtro</div>}
      </div>
    </div>
    </>
    );
  };

  // ─── MODAL CONTENTS ────────────────────────────────────────────────────────
  const FG = ({ label, children, full }) => <div className={`form-group${full?' full':''}`}><label>{label}</label>{children}</div>;
  // Inputs não controlados — sem re-render ao digitar, salva no onChange via ref
  const FI = ({ k, disabled, type, placeholder, style }) => {
    const r = useRef(null);
    useEffect(() => { if(r.current && document.activeElement !== r.current) r.current.value = fv(k)||''; });
    return <input ref={r} defaultValue={fv(k)||''} onBlur={e=>sf(k,e.target.value)} onChange={e=>sf(k,e.target.value)} disabled={disabled} type={type} placeholder={placeholder} style={style} />;
  };
  const FS = ({ k, opts, disabled }) => {
    const r = useRef(null);
    useEffect(() => { if(r.current) r.current.value = fv(k)||''; });
    return <select ref={r} defaultValue={fv(k)||''} onChange={e=>sf(k,e.target.value)} disabled={disabled}>{opts.map(o=><option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}</select>;
  };
  const FT = ({ k, disabled, placeholder }) => {
    const r = useRef(null);
    useEffect(() => { if(r.current && document.activeElement !== r.current) r.current.value = fv(k)||''; });
    return <textarea ref={r} defaultValue={fv(k)||''} onBlur={e=>sf(k,e.target.value)} onChange={e=>sf(k,e.target.value)} disabled={disabled} placeholder={placeholder} />;
  };

  // Campo de data não controlado
  const FD = ({ k, disabled }) => {
    const r = useRef(null);
    useEffect(() => { if(r.current && document.activeElement !== r.current) r.current.value = fromISO(fv(k))||''; });
    return <input ref={r} defaultValue={fromISO(fv(k))||''} onChange={e=>sf(k,e.target.value)} onBlur={e=>sf(k,e.target.value)} placeholder="DD/MM/AAAA" maxLength={10} disabled={disabled} style={{letterSpacing:'0.05em'}} />;
  };

  const renderModalContent = () => {
    if (!modal) return null;
    const { tipo, id } = modal;
    const ro = tipo === 'ver';
    const cOpts = contratos.map(c => ({ v: c.id, l: `${c.numero} · ${c.empresa.substring(0,26)}` }));

    if (tipo === 'novo' || tipo === 'editar' || tipo === 'ver') return (
      <>
        <div className="form-row"><div className="sec-label">Identificação</div></div>
        <div className="form-row">
          <FG label="Nº do contrato *"><FI k="numero" placeholder="000/2025" disabled={ro} /></FG>
          <FG label="Tipo de contrato"><FS k="tipo" opts={['Serviço continuado','Fornecimento','Gestão','Obra','Serviço','Locação']} disabled={ro} /></FG>
          <FG label="Empresa contratada *" full><FI k="empresa" placeholder="Razão social" disabled={ro} /></FG>
          <FG label="Objeto do contrato *" full><FI k="objeto" placeholder="Descrição do objeto" disabled={ro} /></FG>
          <FG label="Segmento"><FI k="segmento" placeholder="Ex: Diagnóstico por imagem" disabled={ro} /></FG>
          <FG label="Setor responsável"><FI k="setor" placeholder="Ex: CME, Laboratório" disabled={ro} /></FG>
        </div>
        <div className="form-row"><div className="sec-label">Responsáveis</div></div>
        <div className="form-row">
          <FG label="Fiscal do contrato"><FI k="fiscal" disabled={ro} /></FG>
          <FG label="Gestor do contrato"><FI k="gestor" disabled={ro} /></FG>
        </div>
        <div className="form-row"><div className="sec-label">Vigência e valores</div></div>
        <div className="form-row cols3">
          <FG label="Data de início"><FD k="inicio" disabled={ro} /></FG>
          <FG label="Data final (vencimento)"><FD k="fim" disabled={ro} /></FG>
          <FG label="Vigência em meses"><FI k="vigencia_meses" type="number" placeholder="12" disabled={ro} /></FG>
          <FG label="Forma de medição"><FS k="medicao" opts={['Por produção','Por ciclo','Por consumo','Por indicadores','Mensal fixo']} disabled={ro} /></FG>
          <FG label="Valor mensal (R$)"><FI k="vlr_mensal" type="number" placeholder="0,00" disabled={ro} /></FG>
          <FG label="Valor total contratado (R$)"><FI k="vlr_total" type="number" placeholder="0,00" disabled={ro} /></FG>
          <FG label="Status"><FS k="status" opts={[{v:'vigente',l:'Vigente'},{v:'proximo',l:'Próx. vencimento'},{v:'vencido',l:'Vencido'},{v:'em renovacao',l:'Em renovação'}]} disabled={ro} /></FG>
        </div>
        <div className="cell-m" style={{fontSize:11,marginTop:-6,marginBottom:8}}>Usada no cálculo de saldo e análise preditiva — evita erro de contar 11 ou 13 meses por causa da data exata. Deixe em branco pra calcular automaticamente pelas datas (menos confiável).</div>
        {!ro && <><div className="form-row"><div className="sec-label">Controle financeiro</div></div>
        <div className="form-row">
          <FG label="Valor acumulado executado (R$)"><FI k="consumo_acum" type="number" placeholder="0,00" /></FG>
        </div></>}
        {tipo !== 'novo' && (() => {
          const itensDoContrato = itens.filter(i => i.contrato_id === modal.id);
          const rubricasUnicas = [...new Set(itensDoContrato.map(i => i.rubrica).filter(Boolean))];
          const mista = rubricasUnicas.length > 1;
          const rubricaAtual = rubricasUnicas.length === 1 ? rubricasUnicas[0] : (mista ? '__mista__' : '');
          return (
            <>
              <div className="form-row"><div className="sec-label">Rubrica orçamentária</div></div>
              <div className="form-row">
                <FG label={itensDoContrato.length ? `Aplicar a todos os ${itensDoContrato.length} item(ns) deste contrato` : 'Aplicar aos itens deste contrato'} full>
                  <select defaultValue={rubricaAtual} onChange={e=>sf('rubrica_aplicar_todos', e.target.value)} disabled={ro || itensDoContrato.length===0}>
                    {mista && <option value="__mista__">— Múltiplas rubricas nos itens (escolha uma pra padronizar) —</option>}
                    <option value="">— Sem rubrica —</option>
                    {RUBRICAS_ORCAMENTARIAS.map(r => <option key={r.cod} value={r.cod}>{r.cod} - {r.desc}</option>)}
                  </select>
                </FG>
              </div>
              {itensDoContrato.length===0 && <div className="cell-m" style={{fontSize:11,marginTop:-6}}>Este contrato ainda não tem itens cadastrados.</div>}
              {!ro && itensDoContrato.length>0 && <div className="cell-m" style={{fontSize:11,marginTop:-6}}>Ao salvar, a rubrica escolhida aqui é aplicada de uma vez a todos os itens — não precisa editar item por item.</div>}
            </>
          );
        })()}
      </>
    );

    if (tipo === 'aditivo') return (
      <div className="form-row" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11}}>
        <FG label="Contrato *"><FS k="contrato_id" opts={[{v:'',l:'— Selecionar —'},...cOpts]} /></FG>
        <FG label="Tipo de aditivo *"><FS k="tipo" opts={['Redistribuição Quantitativa (sem aumento de valor)','Suplementação de valor','Supressão de item','Prorrogação de prazo','Reequilíbrio econômico','Misto (valor + prazo)']} /></FG>
        <FG label="Data da solicitação"><FD k="data" /></FG>
        <FG label="Status"><FS k="status" opts={['Em análise','Aprovado','Indeferido','Encerrado']} /></FG>
        <FG label="Valor acrescido (R$)"><FI k="vlr_acrescido" type="number" placeholder="0,00" /></FG>
        <FG label="Valor suprimido (R$)"><FI k="vlr_suprimido" type="number" placeholder="0,00" /></FG>
        <FG label="Novo prazo final (se aplicável)"><FD k="novo_prazo" /></FG>
        <FG label="Nº do processo SEI"><FI k="obs" placeholder="Ex: 2026.001234" /></FG>
        <FG label="Justificativa *" full><FT k="justificativa" placeholder="Fundamento legal e técnico (ex: art. 124, Lei 14.133/2021)..." /></FG>
      </div>
    );

    if (tipo === 'item' || tipo === 'editar-item') {
      const contratoIdReal = tipo === 'editar-item' ? fv('contrato_id') : id;
      const contratoAtual = contratos.find(c => c.id === contratoIdReal);
      const ehContratoMedico = contratoAtual?.segmento === 'Recursos humanos médicos' || contratoAtual?.numero?.includes('002/2024');

      if (ehContratoMedico) {
        return (
          <div className="empty">
            <i className="fa-solid fa-circle-info" />
            Os 21 itens deste contrato são fixos pelo Termo Aditivo (Quadros I a VI) e já estão cadastrados.<br/>
            <span style={{fontSize:12,marginTop:6,display:'block'}}>Para lançar quem trabalhou em cada item todo mês, use <strong>Medições Mensais</strong> — lá você escolhe o médico (de uma lista que cresce conforme você digita) e a quantidade, sem precisar cadastrar item novo.</span>
          </div>
        );
      }
      return (
        <div className="form-row" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11}}>
          <FG label="Item / serviço *" full><FI k="item" placeholder="Descrição completa do item" /></FG>
          <FG label="Nº do item (ordem no PDF)"><FI k="ordem" type="number" placeholder="Automático se deixar em branco" /></FG>
          <FG label="Lote (opcional)"><FI k="lote" placeholder="Ex: LOTE I - LOCAÇÃO (deixe em branco se não houver lotes)" /></FG>
          <FG label="Rubrica orçamentária (opcional)">
            <FS k="rubrica" opts={[{v:'',l:'— Sem rubrica —'}, ...RUBRICAS_ORCAMENTARIAS.map(r=>({v:r.cod, l:`${r.cod} - ${r.desc}`}))]} />
          </FG>
          <FG label="Quantidade contratada/mês *"><FI k="qtd_mensal" type="number" placeholder="0" /></FG>
          <FG label="Qtd. TOTAL contratada (toda a vigência)"><FI k="qtd_total_contratada" type="number" placeholder="Deixe em branco = qtd/mês × meses de vigência" /></FG>
          <FG label="Unidade de medida"><FI k="unit" placeholder="Ex: exame, m³, ciclo" /></FG>
          <FG label="Valor unitário (R$)"><FI k="vlr_unitario" type="number" placeholder="0,00" /></FG>
          <FG label="Qtd executada este mês"><FI k="qtd_exec" type="number" placeholder="0" /></FG>
          <FG label="Qtd acumulada total"><FI k="qtd_acum" type="number" placeholder="0" /></FG>
        </div>
      );
    }

    if (tipo === 'execucao') {
      const c = contratos.find(x => x.id === id);
      return (
        <>
          {c && <AlertBox cls="azul" icon="fa-circle-info">Contrato <strong>{c.numero}</strong> · Saldo atual: <strong>{brl(c.vlr_total - c.consumo_acum)}</strong></AlertBox>}
          <div className="form-row" style={{marginTop:12}}>
            <FG label="Mês de referência"><FI k="mes_referencia" type="month" /></FG>
            <FG label="Valor executado (R$) *"><FI k="valor" type="number" placeholder="0,00" /></FG>
            <FG label="Observações" full><FI k="observacao" placeholder="Ex: medição parcial, glosa, ajuste..." /></FG>
          </div>
        </>
      );
    }

    if (tipo === 'prorrog') {
      const c = contratos.find(x => x.id === id);
      const d = c ? dias(c.fim) : 0;
      return (
        <>
          <AlertBox cls={d<0?'vermelho':'amarelo'} icon="fa-calendar-days">
            Vencimento atual: <strong>{fmtD(c?.fim)}</strong> · {d<0?`Vencido há ${Math.abs(d)} dia(s)`:`${d} dia(s) restantes`}
          </AlertBox>
          <div className="form-row" style={{marginTop:12}}>
            <FG label="Novo prazo final *"><FD k="novo_prazo" /></FG>
            <FG label="Nº do processo SEI"><FI k="sei" placeholder="2026.XXXXXX" /></FG>
            <FG label="Justificativa *" full><FT k="justificativa" placeholder="Ex: art. 107 da Lei 14.133/2021 — necessidade de continuidade do serviço..." /></FG>
            <FG label="Observações" full><FT k="obs" placeholder="Informações adicionais..." /></FG>
          </div>
        </>
      );
    }
    return null;
  };

  const modalConfig = {
    novo: { title:'Cadastrar novo contrato', icon:'fa-file-contract', onSave: salvarContrato },
    editar: { title:`Editar contrato`, icon:'fa-pen', onSave: salvarContrato },
    ver: { title:'Detalhes do contrato', icon:'fa-eye', onSave: null },
    aditivo: { title:'Registrar aditivo / supressão', icon:'fa-file-pen', onSave: salvarAditivo },
    item: { title:'Adicionar item contratado', icon:'fa-boxes-stacked', onSave: salvarItem },
    'editar-item': { title:'Editar item contratado', icon:'fa-pen', onSave: salvarItem },
    execucao: { title:'Registrar execução mensal (desativado)', icon:'fa-circle-dollar-to-slot', onSave: null },
    prorrog: { title:'Solicitar prorrogação de prazo', icon:'fa-clock-rotate-left', onSave: salvarProrrog },
  };

  // ─── MEDIÇÕES MENSAIS ────────────────────────────────────────────────────
  const [medicaoContrato, setMedicaoContrato] = React.useState('');
  const [medicaoMes, setMedicaoMes] = React.useState(todayMonth());
  const [medicaoItens, setMedicaoItens] = React.useState({});
  const [medicaoNumMedicao, setMedicaoNumMedicao] = React.useState('');
  const [pendenteRegistro, setPendenteRegistro] = React.useState(null); // { totalGeral, numero, mesLabel, executar }
  const [radiocomRows, setRadiocomRows] = React.useState({}); // { [item_id]: [{uid, dia_semana, medico_nome, quantidade}] }

  useEffect(() => {
    if (!medicaoContrato || !medicaoMes) { setRadiocomRows({}); return; }
    const c = contratos.find(x => x.id === medicaoContrato);
    if (!c || tipoContrato(c.numero) !== 'medicos') return;
    const itensDoContrato = itens.filter(i => i.contrato_id === medicaoContrato);
    const rows = {};
    itensDoContrato.forEach(it => {
      const existentes = lancamentos.filter(l => l.item_id === it.id && l.mes_referencia === medicaoMes);
      if (existentes.length) {
        rows[it.id] = existentes.map(l => ({ uid: l.id, dia_semana: l.dia_semana||null, medico_nome: l.medico_nome||'', quantidade: l.quantidade||0 }));
      } else if (it.medico_padrao) {
        // Quadros III/IV/V: o médico é fixo (conforme última medição) — já vem preenchido,
        // só falta o usuário digitar a quantidade do mês.
        rows[it.id] = [{ uid: uid('L'), dia_semana: isDiaSemanaItem(it) ? (it.dias_aplicaveis?.split(',')[0]||null) : null, medico_nome: it.medico_padrao, quantidade: 0 }];
      } else {
        rows[it.id] = [];
      }
    });
    setRadiocomRows(rows);
  }, [medicaoContrato, medicaoMes, itens, lancamentos]);

  const addRadiocomRow = (itemId, diaSemanaDefault) => {
    setRadiocomRows(prev => ({ ...prev, [itemId]: [...(prev[itemId]||[]), { uid: uid('L'), dia_semana: diaSemanaDefault||null, medico_nome:'', quantidade:0 }] }));
  };
  const updateRadiocomRow = (itemId, rowUid, campo, valor) => {
    setRadiocomRows(prev => ({ ...prev, [itemId]: (prev[itemId]||[]).map(r => r.uid===rowUid ? {...r, [campo]: valor} : r) }));
  };
  const removeRadiocomRow = (itemId, rowUid) => {
    setRadiocomRows(prev => ({ ...prev, [itemId]: (prev[itemId]||[]).filter(r => r.uid !== rowUid) }));
  };

  const tipoContrato = (numero) => {
    if(['019/2024'].includes(numero)) return 'exames_lote';
    if(['008/2024','008/2024 2º TA'].includes(numero)) return 'esterilizacao';
    if(['002/2024','002/2024 1º TA'].includes(numero)) return 'medicos';
    return 'fixo'; // A4PM, Labtec, LS Toledo e demais
  };

  const mesToPT = (mes) => {
    if(!mes) return '';
    const [y,m] = mes.split('-');
    const nomes = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    return nomes[parseInt(m)] + ' ' + y;
  };
  
  // Conta meses de calendário entre duas datas (mais preciso que dias/30)
const mesesCalendario = (dataInicioStr, dataFimStr) => {
  const ini = new Date(dataInicioStr);
  const fim = new Date(dataFimStr);
  let meses = (fim.getFullYear() - ini.getFullYear()) * 12 + (fim.getMonth() - ini.getMonth());
  if (fim.getDate() < ini.getDate()) meses -= 1; // ainda não completou o mês corrente
  return Math.max(0, meses);
};

  const gerarPDF = async () => {
    const c = contratos.find(x => x.id === medicaoContrato);
    if(!c) { alert('Selecione um contrato.'); return; }
    const tipo = tipoContrato(c.numero);
    const itensMes = itens.filter(i => i.contrato_id === medicaoContrato);
    const mesRef = mesToPT(medicaoMes);
    const [y,m] = medicaoMes.split('-');
    const diasMes = new Date(parseInt(y), parseInt(m), 0).getDate();
    const periodoMes = `01/${m}/${y} À ${diasMes}/${m}/${y}`;

    // Calcula total geral (contratos genéricos - fixo/exames_lote)
    let totalGeral = 0;
    itensMes.forEach(it => {
      const qtd = parseFloat(medicaoItens[it.id] || 0);
      const vlrUnit = parseFloat(medicaoItens['vu_'+it.id] || it.vlr_unitario || 0);
      totalGeral += qtd * vlrUnit;
    });

    const logoImg = LOGO_PDF_B64 ? `<img src="data:image/png;base64,${LOGO_PDF_B64}" style="width:100%;max-width:100%;display:block;">` : '<strong>PRIMA QUALITÁ SAÚDE</strong>';

    const estilos = `
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        .header { text-align: center; margin-bottom: 16px; }

        .titulo-box h2 { font-size: 14px; font-weight: bold; }

    const cabecalho = (numMedicao) => `

    const rodape = () => `
      <div class="rodape-sistema">

    let corpoTabela = '';

    // Modelo unificado, dirigido pelos dados (não mais um "if" hardcoded por contrato):
    // se algum item tiver "lote" e/ou "rubrica" preenchido, agrupa em tabelas

    const contratoAtualNome = contratos.find(c=>c.id===medicaoContrato)?.numero || '';
    setPendenteRegistro({

              qtd_executada: qtdExec, vlr_unitario: vu, updated_at: new Date().toISOString()

            .select('item_id,qtd_executada,qtd_semana,qtd_fds')

          const somaPorItem = {};
          (historico||[]).forEach(r => { somaPorItem[r.item_id] = (somaPorItem[r.item_id]||0) + (r.qtd_executada||0) + (r.qtd_semana||0) + (r.qtd_fds||0); });
          const atualizaItens = itensMesLocal.map(it => {
            const qtdExec = parseFloat(medicaoItens[it.id] || 0);

            return sb().from('itens').update(patch).eq('id', it.id);

  // ─── GERAR PDF + REGISTRAR (contratos de médicos — Radiocom) ──────────────
  // Modelo espelha exatamente a planilha oficial: por Quadro, item, dia da

  // dia/item — cada linha é livre para adicionar/remover.
  const gerarPDFRadiocom = async () => {
    const c = contratos.find(x => x.id === medicaoContrato);
    if (!c) { alert('Selecione um contrato.'); return; }
    const itensDoContrato = itens.filter(i => i.contrato_id === c.id).slice().sort((a,b)=>(a.ordem||0)-(b.ordem||0));
    const mesRef = mesToPT(medicaoMes);

    const periodoMes = `01/${m}/${y} À ${diasMes}/${m}/${y}`;

    let totalGeral = 0;

    const blocos = quadros.map(quadroNome => {
      const itensQuadro = itensDoContrato.filter(it => (it.quadro||'Outros itens') === quadroNome);
      let totalQuadro = 0;
      const linhas = itensQuadro.map(it => {
        const rows = radiocomRows[it.id] || [];
        const isDia = isDiaSemanaItem(it);
        if (!rows.length) {
          return `<tr><td class="num">${it.ordem}</td><td class="desc">${it.item}</td><td class="num">${it.carga_horaria||'—'}</td><td class="num">${it.vaga||''}</td><td class="desc">—</td><td class="desc">—</td><td class="num">0</td><td class="val">R$ ${(it.vlr_unitario||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td><td class="val">R$ 0,00</td></tr>`;
        }
        return rows.map(r => {
          const qtd = parseFloat(r.quantidade) || 0;
          const total = qtd * (it.vlr_unitario||0);
          totalQuadro += total;
          return `<tr>
            <td class="num">${it.ordem}</td>
            <td class="desc">${it.item}</td>
            <td class="num">${it.carga_horaria||'—'}</td>
            <td class="num">${it.vaga||''}</td>
            <td class="desc">${isDia ? (DIAS_SEMANA_LABEL[r.dia_semana]||'—') : '—'}</td>
            <td class="desc">${r.medico_nome||'—'}</td>
            <td class="num">${qtd}</td>
            <td class="val">R$ ${(it.vlr_unitario||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
            <td class="val">R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
          </tr>`;
        }).join('');
      }).join('');
      totalGeral += totalQuadro;
      return `<div class="lote-titulo">${quadroNome}</div>
        <table><thead><tr><th>Item</th><th>Descrição</th><th>Carga Horária</th><th>Vaga</th><th>Dia</th><th>Profissional Médico</th><th>Quant. Plantões</th><th>Valor Plantão</th><th>Valor Bruto</th></tr></thead>
        <tbody>${linhas}
        <tr class="total-row"><td colspan="8" style="text-align:right">TOTAL DO QUADRO</td><td class="val">R$ ${totalQuadro.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td></tr>
        </tbody></table>`;
    }).join('');

    const logoImg = LOGO_PDF_B64 ? `<img src="data:image/png;base64,${LOGO_PDF_B64}" style="width:100%;max-width:100%;display:block;">` : '<strong>PRIMA QUALITÁ SAÚDE</strong>';
    const estilos = `<style>

      <div class="info">

      <div class="total-geral">TOTAL GERAL &nbsp;&nbsp; R$ ${totalGeral.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
      <div class="rodape-sistema">

</body></html>`;

    setPendenteRegistro({

      executar: async () => {

          }

          await sb().from('medicoes_lancamentos').delete().eq('contrato_id', c.id).eq('mes_referencia', medicaoMes);
          if (novosLancamentos.length) await sb().from('medicoes_lancamentos').insert(novosLancamentos);

          await sb().from('execucoes').upsert({
            id: `${c.id}_${medicaoMes}`, contrato_id: c.id, mes_referencia: medicaoMes,
            valor: totalGeral, observacao: `${medicaoNumMedicao}ª Medição — ${mesToPT(medicaoMes)}`
          }, { onConflict: 'contrato_id,mes_referencia' });

          const { data: histLanc } = await sb().from('medicoes_lancamentos').select('item_id,quantidade').in('item_id', itensDoContrato.map(it=>it.id));
          const somaPorItem = {};
          (histLanc||[]).forEach(r => { somaPorItem[r.item_id] = (somaPorItem[r.item_id]||0) + (r.quantidade||0); });
          const recalcs = itensDoContrato.map(it => sb().from('itens').update({ qtd_acum: somaPorItem[it.id]||0 }).eq('id', it.id));
          await Promise.all(recalcs);

          const { data: execs } = await sb().from('execucoes').select('valor').eq('contrato_id', c.id);
          const totalContrato = (execs||[]).reduce((acc,r)=>acc+(r.valor||0),0);
          await sb().from('contratos').update({ consumo_acum: totalContrato, updated_at: new Date().toISOString() }).eq('id', c.id);

          await loadAll();
          setSaving(false);
          setPendenteRegistro(null);
        } catch(e) {
          setSaving(false);
          alert('Erro ao registrar medição: ' + e.message);
        }
      }
    });
  };

  // ─── EXCLUIR MEDIÇÃO REGISTRADA (correção de lançamento indevido) ─────────
  // Remove a execução do mês e seus lançamentos detalhados (item a item ou
  // médico a médico, conforme o tipo de contrato), depois recalcula qtd_acum
  // de cada item e o consumo_acum do contrato a partir do que restou —
  // os mesmos cálculos usados no registro normal, então nada fica dessincronizado.
  const excluirMedicao = async (execucao) => {
    setSaving(true);
    try {
      const contratoId = execucao.contrato_id;
      const mes = execucao.mes_referencia;
      const c = contratos.find(x => x.id === contratoId);
      const ehMedico = c && tipoContrato(c.numero) === 'medicos';
      const itensDoContrato = itens.filter(i => i.contrato_id === contratoId);
      const itemIds = itensDoContrato.map(it => it.id);

      if (ehMedico) {
        await sb().from('medicoes_lancamentos').delete().eq('contrato_id', contratoId).eq('mes_referencia', mes);
      } else {
        await sb().from('medicoes_itens').delete().eq('contrato_id', contratoId).eq('mes_referencia', mes);
      }
      await sb().from('execucoes').delete().eq('contrato_id', contratoId).eq('mes_referencia', mes);

      if (ehMedico) {
        const { data: histLanc } = await sb().from('medicoes_lancamentos').select('item_id,quantidade').in('item_id', itemIds);
        const somaPorItem = {};
        (histLanc||[]).forEach(r => { somaPorItem[r.item_id] = (somaPorItem[r.item_id]||0) + (r.quantidade||0); });
        await Promise.all(itensDoContrato.map(it => sb().from('itens').update({ qtd_acum: somaPorItem[it.id]||0 }).eq('id', it.id)));
      } else {
        const { data: historico } = await sb().from('medicoes_itens').select('item_id,qtd_executada,qtd_semana,qtd_fds').in('item_id', itemIds);
        const somaPorItem = {};
        (historico||[]).forEach(r => { somaPorItem[r.item_id] = (somaPorItem[r.item_id]||0) + (r.qtd_executada||0) + (r.qtd_semana||0) + (r.qtd_fds||0); });
        await Promise.all(itensDoContrato.map(it => sb().from('itens').update({ qtd_acum: somaPorItem[it.id]||0 }).eq('id', it.id)));
      }

      const { data: execs } = await sb().from('execucoes').select('valor').eq('contrato_id', contratoId);
      const totalContrato = (execs||[]).reduce((acc,r)=>acc+(r.valor||0),0);
      await sb().from('contratos').update({ consumo_acum: totalContrato, updated_at: new Date().toISOString() }).eq('id', contratoId);

      await loadAll();
      setSaving(false);
      setConfirmarExclusaoChave(null);
    } catch(e) {
      setSaving(false);
      alert('Erro ao excluir medição: ' + e.message);
    }
  };

  // Prefill dos valores lançados quando o usuário reabre um mês já registrado
  // (contratos genéricos) — permite corrigir sem perder o que já foi digitado.
  // Radiocom já tem o equivalente no useEffect de radiocomRows acima.
  useEffect(() => {
    if (!medicaoContrato || !medicaoMes) return;
    const c = contratos.find(x => x.id === medicaoContrato);
    if (!c || tipoContrato(c.numero) === 'medicos') return;
    const itensDoContrato = itens.filter(i => i.contrato_id === medicaoContrato);
    const existentes = medicoesItensHist.filter(mi => mi.contrato_id === medicaoContrato && mi.mes_referencia === medicaoMes);
    if (!existentes.length) return;
    setMedicaoItens(prev => {
      const novo = { ...prev };
      itensDoContrato.forEach(it => {
        const mi = existentes.find(m => m.item_id === it.id);
        if (mi) {
          novo[it.id] = mi.qtd_executada ?? 0;
          novo['vu_'+it.id] = mi.vlr_unitario ?? it.vlr_unitario ?? 0;
        }
      });
      return novo;
    });
    const execExistente = execucoes.find(e => e.contrato_id === medicaoContrato && e.mes_referencia === medicaoMes);
    if (execExistente) {
      const m = (execExistente.observacao||'').match(/^(\d+)ª/);
      if (m) setMedicaoNumMedicao(m[1]);
    }
  }, [medicaoContrato, medicaoMes]);

  const renderMedicao = () => {
    const c = contratos.find(x => x.id === medicaoContrato);
    const itensMes = medicaoContrato ? itens.filter(i => i.contrato_id === medicaoContrato) : [];
    const temCategorias = itens.some(i => i.contrato_id === medicaoContrato && i.quadro); // Radiocom (medicos) usa 'quadro'

    // Total geral calculado em tempo real (contratos genéricos - fixo/exames_lote)
    const totalAtual = itensMes.reduce((acc, it) => {
      const vuT = medicaoItens['vu_'+it.id];
      const vuVal = parseFloat(vuT !== undefined ? vuT : (it.vlr_unitario||0));
      return acc + parseFloat(medicaoItens[it.id]||0) * vuVal;
    }, 0);

    // Layout genérico para outros contratos (sem categoria)
    const renderLancamentoGenerico = () => {
      const itensOrd = itensMes.slice().sort((a,b)=>(a.ordem||999)-(b.ordem||999));
      const nomeGrupoUI = (it) => it.lote || null;
      const temLotesUI = itensOrd.some(it => nomeGrupoUI(it));
      const lotesUI = temLotesUI ? [...new Set(itensOrd.map(it => nomeGrupoUI(it) || 'Itens sem lote'))] : ['__flat__'];

      const linhaTabela = (it, idx) => {
        const qtd = parseFloat(medicaoItens[it.id]||0);
        const vuState = medicaoItens['vu_'+it.id];
        const vu = parseFloat(vuState !== undefined ? vuState : (it.vlr_unitario||0));
        const total = qtd * vu;
        return (
          <tr key={it.id} style={{background:qtd>0?'#f9fffe':'transparent'}}>
            <td className="mono" style={{textAlign:'center'}}>{it.ordem || (idx+1)}</td>
            <td style={{fontSize:11.5,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{it.item}</td>
            <td style={{textAlign:'center'}}>{it.unit||'un.'}</td>
            <td style={{textAlign:'center'}}>{it.qtd_mensal}</td>
            <td style={{width:80}}>
              <input type="number" min="0"
                value={medicaoItens[it.id]||''}
                onChange={e=>setMedicaoItens(prev=>({...prev,[it.id]:e.target.value}))}
                style={{width:'100%',padding:'4px 6px',border:'1px solid var(--gray-b)',borderRadius:4,fontSize:12,textAlign:'center'}}/>
            </td>
            <td style={{width:110}}>
              <input type="number" min="0" step="0.01"
                value={medicaoItens['vu_'+it.id] !== undefined ? medicaoItens['vu_'+it.id] : (it.vlr_unitario||'')}
                onChange={e=>setMedicaoItens(prev=>({...prev,['vu_'+it.id]:e.target.value}))}
                style={{width:'100%',padding:'4px 6px',border:'1px solid var(--gray-b)',borderRadius:4,fontSize:12,background:it.vlr_unitario?'#f0fff4':'#fff'}}/>
            </td>
            <td style={{textAlign:'right',fontWeight:700,fontSize:13,
              color:total>0?'var(--teal-d)':'var(--text3)',
              minWidth:110,whiteSpace:'nowrap'}}>
              {total>0
                ? `R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}`
                : <span style={{color:'var(--gray-d)',fontWeight:400}}>—</span>}
            </td>
          </tr>
        );
      };

      return (
        <>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:12,padding:'8px 10px',background:'var(--gray)',borderRadius:6}}>
            Preencha a <strong>quantidade executada no mês</strong> e o <strong>valor unitário</strong> para cada item.
          </div>
          {lotesUI.map(loteNome => {
            const itensLote = temLotesUI ? itensOrd.filter(it => (nomeGrupoUI(it)||'Itens sem lote')===loteNome) : itensOrd;
            return (
              <div key={loteNome} style={{marginBottom:temLotesUI?16:0}}>
                {temLotesUI && <div style={{fontWeight:700,fontSize:12.5,padding:'6px 10px',background:'var(--gray)',borderRadius:5,marginBottom:6}}>{loteNome}</div>}
                <div className="tbl-wrap">
                  <table>
                    <thead><tr><th>Nº</th><th>Item</th><th>Unidade</th><th>Qtd contratada/mês</th><th>Qtd executada *</th><th>Valor unitário (R$) *</th><th>Total mês</th></tr></thead>
                    <tbody>{itensLote.map((it, idx) => linhaTabela(it, idx))}</tbody>
                  </table>
                </div>
              </div>
            );
          })}
        </>
      );
    };

    const ehMedico = c && tipoContrato(c.numero) === 'medicos';

    const renderPainelRadiocom = () => {
      const itensDoContrato = itens.filter(i => i.contrato_id === c.id).slice().sort((a,b)=>(a.ordem||0)-(b.ordem||0));
      const medicosDoContrato = medicos.filter(m => m.contrato_id === c.id);
      const quadros = [...new Set(itensDoContrato.map(it => it.quadro || 'Outros itens'))];
      const totalGeralRadiocom = itensDoContrato.reduce((acc, it) => {
        const rows = radiocomRows[it.id] || [];
        return acc + rows.reduce((a,r) => a + (parseFloat(r.quantidade)||0) * (it.vlr_unitario||0), 0);
      }, 0);
      return (
        <>
          <div className="panel">
            <div className="panel-head"><h2><i className="fa-solid fa-user-doctor"/> Médicos cadastrados neste contrato</h2></div>
            <div className="panel-body">
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
                {medicosDoContrato.length===0 && <span className="cell-m">Nenhum médico cadastrado ainda — digite o nome ao lançar abaixo e ele entra na lista automaticamente.</span>}
                {medicosDoContrato.map(m => (
                  <span key={m.id} className="badge azul" style={{paddingRight:4}}>
                    {m.nome}
                    <button onClick={()=>removerMedico(m.id)} style={{border:'none',background:'none',cursor:'pointer',marginLeft:4,color:'inherit'}} title="Remover do cadastro"><i className="fa-solid fa-xmark"/></button>
                  </span>
                ))}
              </div>
              <div style={{display:'flex',gap:8}}>
                <input id="novo-medico-input" placeholder="Adicionar médico ao cadastro..." style={{maxWidth:280}} />
                <button className="btn btn-secondary btn-sm" onClick={()=>{
                  const el = document.getElementById('novo-medico-input');
                  if (el && el.value.trim()) { addMedicoSeNaoExiste(c.id, el.value.trim()); el.value=''; }
                }}><i className="fa-solid fa-plus"/> Adicionar</button>
              </div>
            </div>
          </div>

          <datalist id={`medicos-datalist-${c.id}`}>
            {medicosDoContrato.map(m => <option key={m.id} value={m.nome} />)}
          </datalist>

          {quadros.map(quadroNome => {
            const itensQuadro = itensDoContrato.filter(it => (it.quadro||'Outros itens') === quadroNome);
            return (
              <div key={quadroNome} className="panel">
                <div className="panel-head"><h2><i className="fa-solid fa-table-list"/> {quadroNome}</h2></div>
                <div className="panel-body">
                  {itensQuadro.map(it => {
                    const rows = radiocomRows[it.id] || [];
                    const isDia = isDiaSemanaItem(it);
                    const diasOpts = it.dias_aplicaveis ? it.dias_aplicaveis.split(',') : (ITENS_FIXOS_RADIOCOM.find(f=>f.item===it.item)?.diasAplicaveis || DIAS_SEMANA);
                    const totalItem = rows.reduce((a,r)=>a+(parseFloat(r.quantidade)||0)*(it.vlr_unitario||0),0);
                    return (
                      <div key={it.id} style={{marginBottom:14,border:'1px solid var(--gray-b)',borderRadius:8,overflow:'hidden'}}>
                        <div style={{padding:'8px 14px',background:'var(--gray)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                          <strong style={{fontSize:12.5}}>{it.ordem}. {it.item}</strong>
                          <span style={{fontSize:12,fontWeight:600,color:'var(--teal-d)'}}>{brl(totalItem)}</span>
                        </div>
                        <div style={{padding:'8px 14px'}}>
                          <div className="tbl-wrap">
                            <table style={{width:'100%',borderCollapse:'collapse'}}>
                              <thead>
                                <tr>
                                  {isDia && <th style={{textAlign:'left',fontSize:11,padding:'4px 6px'}}>Dia da semana</th>}
                                  <th style={{textAlign:'left',fontSize:11,padding:'4px 6px'}}>Médico</th>
                                  <th style={{fontSize:11,padding:'4px 6px'}}>Qtd</th>
                                  <th style={{fontSize:11,padding:'4px 6px'}}>Valor unit.</th>
                                  <th style={{fontSize:11,padding:'4px 6px'}}>Total</th>
                                  <th></th>
                                </tr>
                              </thead>
                              <tbody>
                                {rows.map(r => (
                                  <tr key={r.uid}>
                                    {isDia && (
                                      <td>
                                        <select value={r.dia_semana||diasOpts[0]} onChange={e=>updateRadiocomRow(it.id,r.uid,'dia_semana',e.target.value)} style={{fontSize:12,padding:'4px 6px'}}>
                                          {diasOpts.map(d=><option key={d} value={d}>{DIAS_SEMANA_LABEL[d]}</option>)}
                                        </select>
                                      </td>
                                    )}
                                    <td>
                                      <input list={`medicos-datalist-${c.id}`} value={r.medico_nome}
                                        onChange={e=>updateRadiocomRow(it.id,r.uid,'medico_nome',e.target.value)}
                                        placeholder="Nome do médico" style={{fontSize:12,padding:'4px 6px',width:180}} />
                                    </td>
                                    <td>
                                      <input type="number" min="0" value={r.quantidade}
                                        onChange={e=>updateRadiocomRow(it.id,r.uid,'quantidade',e.target.value)}
                                        style={{width:65,fontSize:12,padding:'4px 6px',textAlign:'center'}} />
                                    </td>
                                    <td className="cell-m" style={{textAlign:'center',fontSize:12}}>{brl(it.vlr_unitario||0)}</td>
                                    <td style={{fontWeight:600,color:'var(--teal-d)',fontSize:12}}>{brl((parseFloat(r.quantidade)||0)*(it.vlr_unitario||0))}</td>
                                    <td><ActBtn icon="fa-trash" onClick={()=>removeRadiocomRow(it.id,r.uid)} danger/></td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                          <button className="btn btn-secondary btn-sm" style={{marginTop:8}} onClick={()=>addRadiocomRow(it.id, isDia?diasOpts[0]:null)}>
                            <i className="fa-solid fa-plus"/> Adicionar {isDia?'lançamento':'médico'}
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}

          <div className="panel"><div className="panel-body" style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--teal-l)'}}>
            <div style={{fontSize:12,color:'var(--teal-d)',fontWeight:500}}>💰 Total calculado da medição</div>
            <div style={{fontSize:20,fontWeight:700,color:'var(--teal-d)'}}>{brl(totalGeralRadiocom)}</div>
          </div></div>
        </>
      );
    };

    return (
      <>
        <div className="panel">
          <div className="panel-head"><h2><i className="fa-solid fa-file-invoice-dollar"/>Gerar medição mensal</h2></div>
          <div className="panel-body">
            <div className="form-row">
              <div className="form-group">
                <label>Contrato</label>
                <select className="sel-contract" style={{margin:0}} value={medicaoContrato} onChange={e=>{
                  const cId = e.target.value;
                  setMedicaoContrato(cId);
                  // Pre-carregar valores unitários do banco (contratos genéricos)
                  const itensDoCont = itens.filter(i => i.contrato_id === cId);
                  const preload = {};
                  itensDoCont.forEach(it => {
                    if (it.vlr_unitario && it.vlr_unitario > 0) {
                      preload['vu_'+it.id] = String(it.vlr_unitario);
                    }
                  });
                  setMedicaoItens(preload);
                }}>
                  <option value="">— Selecione —</option>
                  {contratos.map(c=><option key={c.id} value={c.id}>{c.numero} · {c.empresa?.substring(0,35)}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Mês de referência</label>
                <input type="month" value={medicaoMes} onChange={e=>setMedicaoMes(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Nº da medição</label>
                <input type="number" value={medicaoNumMedicao} onChange={e=>setMedicaoNumMedicao(e.target.value)} placeholder="Ex: 10" />
              </div>
            </div>
          </div>
        </div>

        {ehMedico && (
          <div className="panel"><div className="panel-body" style={{textAlign:'right'}}>
            <button className="btn btn-primary" onClick={gerarPDFRadiocom}><i className="fa-solid fa-file-pdf"/> Gerar PDF e registrar</button>
          </div></div>
        )}
        {ehMedico && renderPainelRadiocom()}

        {!ehMedico && c && itensMes.length > 0 && (
          <div className="panel">
            <div className="panel-head">
              <h2><i className="fa-solid fa-list-check"/>Lançar quantidades — {mesToPT(medicaoMes)}</h2>
              <button className="btn btn-primary" onClick={gerarPDF}><i className="fa-solid fa-file-pdf"/> Gerar PDF e registrar</button>
            </div>
            <div className="panel-body">
              {renderLancamentoGenerico()}
              <div style={{marginTop:14,padding:'10px 14px',background:'var(--teal-l)',borderRadius:6,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{fontSize:12,color:'var(--teal-d)',fontWeight:500}}>💰 Total calculado da medição</div>
                <div style={{fontSize:20,fontWeight:700,color:'var(--teal-d)'}}>
                  R$ {(totalAtual||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
                </div>
              </div>
            </div>
          </div>
        )}

        {!ehMedico && c && itensMes.length === 0 && (
          <div className="panel"><div className="panel-body">
            <div className="empty"><i className="fa-solid fa-boxes-stacked"/>Este contrato não tem itens cadastrados.<br/><span style={{fontSize:12,marginTop:6,display:'block'}}>Cadastre os itens em <strong>Controle de quantidade</strong> primeiro.</span></div>
          </div></div>
        )}

        {!c && (
          <div className="panel"><div className="panel-body">
            <div className="empty"><i className="fa-solid fa-file-invoice-dollar" style={{color:'var(--teal)'}}/>Selecione um contrato acima para lançar a medição do mês.</div>
          </div></div>
        )}
      </>
    );
  };


  // ─── HISTÓRICO DE MEDIÇÕES ───────────────────────────────────────────────
  const renderHistorico = () => {
    const listaExecucoes = execucoes
      .filter(e => !historicoContrato || e.contrato_id === historicoContrato)
      .slice()
      .sort((a,b) => b.mes_referencia.localeCompare(a.mes_referencia));

    const contratoSel = contratos.find(c => c.id === historicoContrato);
    const ehMedicoHist = contratoSel && tipoContrato(contratoSel.numero) === 'medicos';

    // Gráfico de evolução mensal do contrato selecionado
    const trendLabels = listaExecucoes.slice().reverse().map(e => {
      const [y,m] = e.mes_referencia.split('-'); const nomes=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      return nomes[parseInt(m)-1]+'/'+y.substring(2);
    });
    const trendData = listaExecucoes.slice().reverse().map(e => e.valor||0);

    const extrairNumMedicao = (obs) => { const m = (obs||'').match(/^(\d+)ª/); return m ? m[1] : '—'; };

    const detalheDoMes = (e) => {
      if (ehMedicoHist) {
        const lancsDoMes = lancamentos.filter(l => l.contrato_id === e.contrato_id && l.mes_referencia === e.mes_referencia);
        if (!lancsDoMes.length) return <div className="empty" style={{padding:'14px 0'}}>Sem lançamentos detalhados salvos para este mês.</div>;
        const itensDoContrato = itens.filter(i => i.contrato_id === e.contrato_id);
        const porItem = {};
        lancsDoMes.forEach(l => { (porItem[l.item_id] = porItem[l.item_id]||[]).push(l); });
        return (
          <div className="tbl-wrap">
            <table>
              <thead><tr><th>Item</th><th>Dia</th><th>Médico</th><th>Qtd</th><th>Valor unit.</th><th>Total</th></tr></thead>
              <tbody>{Object.entries(porItem).map(([itemId, ls]) => {
                const it = itensDoContrato.find(i => i.id === itemId);
                return ls.map((l,idx) => (
                  <tr key={l.id}>
                    {idx===0 && <td rowSpan={ls.length} style={{fontWeight:600,verticalAlign:'top'}}>{it?.item||'—'}</td>}
                    <td className="cell-m" style={{textAlign:'center'}}>{l.dia_semana ? (DIAS_SEMANA_LABEL[l.dia_semana]||l.dia_semana) : '—'}</td>
                    <td>{l.medico_nome||'—'}</td>
                    <td style={{textAlign:'center'}}>{l.quantidade}</td>
                    <td style={{textAlign:'center'}} className="cell-m">{brl(l.valor_unitario||0)}</td>
                    <td style={{fontWeight:600,color:'var(--teal-d)'}}>{brl((l.quantidade||0)*(l.valor_unitario||0))}</td>
                  </tr>
                ));
              })}</tbody>
            </table>
          </div>
        );
      }
      const itensHist = medicoesItensHist.filter(mi => mi.contrato_id === e.contrato_id && mi.mes_referencia === e.mes_referencia);
      if (!itensHist.length) return <div className="empty" style={{padding:'14px 0'}}>Sem lançamentos detalhados salvos para este mês.</div>;
      const itensDoContrato = itens.filter(i => i.contrato_id === e.contrato_id);
      return (
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>Item</th><th>Qtd executada</th><th>Valor unitário</th><th>Total</th></tr></thead>
            <tbody>{itensHist.map(mi => {
              const it = itensDoContrato.find(i => i.id === mi.item_id);
              const total = (mi.qtd_executada||0) * (mi.vlr_unitario||0);
              return (
                <tr key={mi.id}>
                  <td style={{fontWeight:600}}>{it?.item||'—'}</td>
                  <td style={{textAlign:'center'}}>{mi.qtd_executada}</td>
                  <td style={{textAlign:'center'}} className="cell-m">{brl(mi.vlr_unitario||0)}</td>
                  <td style={{fontWeight:600,color:'var(--teal-d)'}}>{brl(total)}</td>
                </tr>
              );
            })}</tbody>
          </table>
        </div>
      );
    };

    return (
      <>
        <div className="panel">
          <div className="panel-body">
            <select className="sel-contract" style={{margin:0}} value={historicoContrato} onChange={e=>{ setHistoricoContrato(e.target.value); setMesExpandido(null); }}>
              <option value="">— Todos os contratos —</option>
              {contratos.map(c => <option key={c.id} value={c.id}>{c.numero} · {c.empresa?.substring(0,34)}</option>)}
            </select>
          </div>
        </div>

        {historicoContrato && trendData.length > 0 && (
          <div className="panel">
            <div className="panel-head"><h2><i className="fa-solid fa-chart-line"/> Evolução mensal — {contratoSel?.numero}</h2></div>
            <div className="panel-body"><LineChart labels={trendLabels} data={trendData} color="#1D9E75" /></div>
          </div>
        )}

        <div className="panel">
          <div className="panel-head"><h2><i className="fa-solid fa-clock-rotate-left"/> Medições registradas ({listaExecucoes.length})</h2></div>
          {listaExecucoes.length === 0 ? (
            <div className="panel-body"><div className="empty"><i className="fa-solid fa-inbox"/>Nenhuma medição registrada ainda para este filtro.</div></div>
          ) : (
            <div className="tbl-wrap">
              <table>
                <thead><tr><th>Contrato</th><th>Mês</th><th>Nº medição</th><th>Valor total</th><th style={{width:150}}></th></tr></thead>
                <tbody>{listaExecucoes.map(e => {
                  const c = contratos.find(x => x.id === e.contrato_id);
                  const chave = e.contrato_id+'_'+e.mes_referencia;
                  const aberto = mesExpandido === chave;
                  const confirmando = confirmarExclusaoChave === chave;
                  return (
                    <React.Fragment key={chave}>
                      <tr>
                        <td className="mono"><strong>{c?.numero||'—'}</strong></td>
                        <td>{mesToPT(e.mes_referencia)}</td>
                        <td className="cell-m" style={{textAlign:'center'}}>{extrairNumMedicao(e.observacao)}</td>
                        <td style={{fontWeight:700,color:'var(--teal-d)'}}>{brl(e.valor)}</td>
                        <td>
                          {confirmando ? (
                            <div style={{display:'flex',gap:6,alignItems:'center',justifyContent:'flex-end'}}>
                              <span style={{fontSize:11,color:'#b91c1c',fontWeight:600}}>Excluir?</span>
                              <button className="btn btn-danger btn-sm" disabled={saving} onClick={()=>excluirMedicao(e)}>Sim</button>
                              <button className="btn btn-secondary btn-sm" disabled={saving} onClick={()=>setConfirmarExclusaoChave(null)}>Não</button>
                            </div>
                          ) : (
                            <div style={{display:'flex',gap:4,justifyContent:'flex-end'}}>
                              <ActBtn icon={aberto?'fa-chevron-up':'fa-chevron-down'} onClick={()=>setMesExpandido(aberto?null:chave)} title="Ver detalhe" />
                              <ActBtn icon="fa-pen" onClick={()=>{ setMedicaoContrato(e.contrato_id); setMedicaoMes(e.mes_referencia); setSection('medicao'); }} title="Corrigir esta medição" />
                              <ActBtn icon="fa-trash" danger onClick={()=>setConfirmarExclusaoChave(chave)} title="Apagar esta medição" />
                            </div>
                          )}
                        </td>
                      </tr>
                      {aberto && (
                        <tr><td colSpan={5} style={{padding:0,background:'#FAFBFD'}}>
                          <div style={{padding:'10px 16px'}}>{detalheDoMes(e)}</div>
                        </td></tr>
                      )}
                    </React.Fragment>
                  );
                })}</tbody>
              </table>
              <div style={{padding:'8px 16px',fontSize:11.5,color:'var(--text3)'}}>
                <i className="fa-solid fa-circle-info"/> <strong>Corrigir</strong> abre a medição no mês certo com os valores já lançados, prontos pra ajustar e registrar de novo. <strong>Apagar</strong> remove o registro e os lançamentos daquele mês e recalcula automaticamente o saldo acumulado do item e do contrato.
              </div>
            </div>
          )}
        </div>
      </>
    );
  };


  // ─── CONSUMO POR RUBRICA ─────────────────────────────────────────────────
  const renderRubrica = () => {
    const itensComRubrica = itens.filter(it => it.rubrica);
    const rubricas = [...new Set(itensComRubrica.map(it => it.rubrica))];
    const contratosSemRubrica = contratos.filter(c => itens.some(it => it.contrato_id === c.id) && !itens.some(it => it.contrato_id === c.id && it.rubrica));

    const anoRef = rubricaMes.slice(0,4);
    const dadosRubrica = rubricas.map(rub => {
      const info = rubricaInfo(rub);
      const itensRub = itensComRubrica.filter(it => it.rubrica === rub);
      const contratado = itensRub.reduce((acc,it) => acc + (it.vlr_unitario||0)*(it.qtd_mensal||0), 0);
      // Executado no mês selecionado: contratos genéricos usam medicoesItensHist; médicos usam lancamentos.
      const executado = itensRub.reduce((acc, it) => {
        const histGenerico = medicoesItensHist.filter(mi => mi.item_id === it.id && mi.mes_referencia === rubricaMes)
          .reduce((a,mi) => a + (mi.qtd_executada||0)*(mi.vlr_unitario||it.vlr_unitario||0), 0);
        const histMedico = lancamentos.filter(l => l.item_id === it.id && l.mes_referencia === rubricaMes)
          .reduce((a,l) => a + (l.quantidade||0)*(l.valor_unitario||it.vlr_unitario||0), 0);
        return acc + histGenerico + histMedico;
      }, 0);
      const tetoMensal = info?.mensal || 0;
      const pctTeto = tetoMensal>0 ? Math.round((executado/tetoMensal)*100) : 0;
      const pctContratado = contratado>0 ? Math.round((executado/contratado)*100) : 0;

      // ── Projeção anual: pega todo mês do ano de rubricaMes com execução real
      // registrada (qualquer contrato desta rubrica) e projeta pelos 12 meses.
      const porMesAno = {};
      itensRub.forEach(it => {
        medicoesItensHist.filter(mi => mi.item_id === it.id && mi.mes_referencia.startsWith(anoRef)).forEach(mi => {
          porMesAno[mi.mes_referencia] = (porMesAno[mi.mes_referencia]||0) + (mi.qtd_executada||0)*(mi.vlr_unitario||it.vlr_unitario||0);
        });
        lancamentos.filter(l => l.item_id === it.id && l.mes_referencia.startsWith(anoRef)).forEach(l => {
          porMesAno[l.mes_referencia] = (porMesAno[l.mes_referencia]||0) + (l.quantidade||0)*(l.valor_unitario||it.vlr_unitario||0);
        });
      });
      const mesesComDado = Object.keys(porMesAno).filter(m => porMesAno[m] > 0);
      const executadoAno = Object.values(porMesAno).reduce((a,b)=>a+b, 0);
      const mediaMensalReal = mesesComDado.length ? executadoAno / mesesComDado.length : 0;
      const projecaoAnual = mediaMensalReal * 12;
      const tetoAnual = info?.anual || 0;
      const pctAnual = tetoAnual>0 ? Math.round((projecaoAnual/tetoAnual)*100) : 0;

      // Contribuição por contrato dentro desta rubrica
      const contratosIds = [...new Set(itensRub.map(it => it.contrato_id))];
      const porContrato = contratosIds.map(cid => {
        const c = contratos.find(x => x.id === cid);
        const itensDoContratoNaRubrica = itensRub.filter(it => it.contrato_id === cid);
        const execContrato = itensDoContratoNaRubrica.reduce((acc, it) => {
          const hg = medicoesItensHist.filter(mi => mi.item_id === it.id && mi.mes_referencia === rubricaMes).reduce((a,mi)=>a+(mi.qtd_executada||0)*(mi.vlr_unitario||it.vlr_unitario||0),0);
          const hm = lancamentos.filter(l => l.item_id === it.id && l.mes_referencia === rubricaMes).reduce((a,l)=>a+(l.quantidade||0)*(l.valor_unitario||it.vlr_unitario||0),0);
          return acc + hg + hm;
        }, 0);
        return { contrato:c, valor:execContrato };
      }).sort((a,b) => b.valor - a.valor);
      return { rubrica:rub, desc:info?.desc||'', tetoMensal, contratado, executado, pctTeto, pctContratado, porContrato,
                mesesComDado:mesesComDado.length, executadoAno, mediaMensalReal, projecaoAnual, tetoAnual, pctAnual };
    }).sort((a,b) => b.pctAnual - a.pctAnual);

    return (
      <>
        <div className="panel">
          <div className="panel-body">
            <div className="form-group" style={{maxWidth:220}}>
              <label>Mês de referência</label>
              <input type="month" value={rubricaMes} onChange={e=>setRubricaMes(e.target.value)} />
            </div>
          </div>
        </div>

        {rubricas.length === 0 ? (
          <div className="panel"><div className="panel-body">
            <div className="empty"><i className="fa-solid fa-scale-balanced"/>Nenhum item tem rubrica cadastrada ainda.<br/><span style={{fontSize:12,marginTop:6,display:'block'}}>Edite os itens em <strong>Controle de quantidade</strong> e escolha a rubrica orçamentária.</span></div>
          </div></div>
        ) : (
          <>
            <div className="panel">
              <div className="panel-head"><h2><i className="fa-solid fa-chart-bar"/> % do teto anual projetado — com base na média real até {mesToPT(rubricaMes)}</h2></div>
              <div className="panel-body">
                <HorizontalBarChart labels={dadosRubrica.map(d=>`${d.rubrica}`)} data={dadosRubrica.map(d=>d.pctAnual)} color="#178DBB" height={Math.max(180,dadosRubrica.length*36)} />
              </div>
            </div>

            <div className="panel">
              <div className="panel-head">
                <h2><i className="fa-solid fa-list"/> Resumo por rubrica ({dadosRubrica.length})</h2>
                <span style={{fontSize:11.5,color:'var(--text3)'}}>Clique numa linha pra ver o detalhe por contrato</span>
              </div>
              <div className="tbl-wrap">
                <table>
                  <thead><tr>
                    <th>Rubrica</th><th>Teto mensal</th><th>Executado no mês</th><th>% mês</th>
                    <th>Média real/mês</th><th>Projeção anual</th><th>Teto anual</th><th>% anual projetado</th><th></th>
                  </tr></thead>
                  <tbody>{dadosRubrica.map(d => {
                    const clsAnual = d.pctAnual>=100?'vermelho':d.pctAnual>=85?'laranja':d.pctAnual>=70?'amarelo':'verde';
                    const aberto = rubricaExpandida === d.rubrica;
                    return (
                      <React.Fragment key={d.rubrica}>
                        <tr style={{cursor:'pointer'}} onClick={()=>setRubricaExpandida(aberto?null:d.rubrica)}>
                          <td><strong className="mono">{d.rubrica}</strong><div style={{fontSize:11,color:'var(--text3)',maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.desc}</div></td>
                          <td>{brl(d.tetoMensal)}</td>
                          <td style={{fontWeight:600,color:d.executado>d.tetoMensal?'#b91c1c':'var(--text)'}}>{brl(d.executado)}</td>
                          <td style={{minWidth:90}}><ProgBar p={Math.min(d.pctTeto,100)}/></td>
                          <td>{brl(d.mediaMensalReal)}<div style={{fontSize:10.5,color:'var(--text3)'}}>{d.mesesComDado} {d.mesesComDado===1?'mês':'meses'} com dado em {anoRef}</div></td>
                          <td style={{fontWeight:600}}>{brl(d.projecaoAnual)}</td>
                          <td>{brl(d.tetoAnual)}</td>
                          <td style={{minWidth:110}}><Badge cls={clsAnual} label={`${d.pctAnual}%`} /></td>
                          <td><ActBtn icon={aberto?'fa-chevron-up':'fa-chevron-down'} onClick={(e)=>{e.stopPropagation(); setRubricaExpandida(aberto?null:d.rubrica);}} title="Ver detalhe por contrato" /></td>
                        </tr>
                        {aberto && (
                          <tr><td colSpan={9} style={{padding:0,background:'#FAFBFD'}}>
                            <div style={{padding:'14px 16px'}}>
                              <div style={{display:'flex',gap:20,marginBottom:12,flexWrap:'wrap'}}>
                                <div><div className="s-label">Diferença p/ o teto mensal</div><div style={{fontWeight:700,fontSize:15,color:d.executado>d.tetoMensal?'#b91c1c':'#16a34a'}}>{d.executado>d.tetoMensal?'+':''}{brl(d.executado-d.tetoMensal)}</div></div>
                                <div><div className="s-label">Executado acumulado em {anoRef}</div><div style={{fontWeight:700,fontSize:15}}>{brl(d.executadoAno)}</div></div>
                                <div><div className="s-label">Diferença p/ o teto anual (projetado)</div><div style={{fontWeight:700,fontSize:15,color:d.projecaoAnual>d.tetoAnual?'#b91c1c':'#16a34a'}}>{d.projecaoAnual>d.tetoAnual?'+':''}{brl(d.projecaoAnual-d.tetoAnual)}</div></div>
                                <div><div className="s-label">Contratado (soma dos itens)</div><div style={{fontWeight:700,fontSize:15}}>{brl(d.contratado)}</div></div>
                              </div>
                              <div className="tbl-wrap">
                                <table>
                                  <thead><tr><th>Contrato</th><th>Empresa</th><th>Executado no mês</th><th>% do teto da rubrica</th></tr></thead>
                                  <tbody>{d.porContrato.map(pc => (
                                    <tr key={pc.contrato?.id}>
                                      <td className="mono"><strong>{pc.contrato?.numero}</strong></td>
                                      <td style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pc.contrato?.empresa}</td>
                                      <td style={{fontWeight:600}}>{brl(pc.valor)}</td>
                                      <td style={{minWidth:100}}><ProgBar p={d.tetoMensal>0?Math.min(Math.round((pc.valor/d.tetoMensal)*100),100):0} /></td>
                                    </tr>
                                  ))}</tbody>
                                </table>
                              </div>
                            </div>
                          </td></tr>
                        )}
                      </React.Fragment>
                    );
                  })}</tbody>
                </table>
              </div>
              <div style={{padding:'8px 16px',fontSize:11.5,color:'var(--text3)'}}>
                <i className="fa-solid fa-circle-info"/> <strong>Projeção anual</strong> = média real de execução por mês (considerando só os meses de {anoRef} com dado lançado) × 12. Ordenado pelo maior % do teto anual projetado primeiro.
              </div>
            </div>
          </>
        )}

        {contratosSemRubrica.length > 0 && (
          <div className="panel"><div className="panel-body" style={{fontSize:11.5,color:'var(--text2)'}}>
            <i className="fa-solid fa-circle-info"/> {contratosSemRubrica.length} contrato(s) ainda sem rubrica cadastrada nos itens: {contratosSemRubrica.map(c=>c.numero).join(', ')}
          </div></div>
        )}
      </>
    );
  };


  // ─── RELATÓRIO MENSAL ────────────────────────────────────────────────────
  const [relatorioMes, setRelatorioMes] = React.useState(todayMonth());
  const [pedidoContrato, setPedidoContrato] = React.useState('');
  const [pedidoQtds, setPedidoQtds] = React.useState({}); // { [item_id]: quantidade a pedir }
  const [pedidoBase, setPedidoBase] = React.useState('media'); // 'media' | 'contratado'

  useEffect(() => {
    if (!pedidoContrato) { setPedidoQtds({}); return; }
    const c = contratos.find(x => x.id === pedidoContrato);
    const itensDoContrato = itens.filter(i => i.contrato_id === pedidoContrato);
    const novasQtds = {};
    itensDoContrato.forEach(it => {
      if (pedidoBase === 'contratado') {
        novasQtds[it.id] = it.qtd_mensal || 0;
      } else {
        // Média histórica real. Se o item nunca foi usado ainda (sem histórico),
        // não faz sentido sugerir o valor contratado inteiro — deixa em branco
        // pra quem está pedindo preencher com o que realmente precisa.
        if (c?.inicio && (it.qtd_acum||0) > 0) {
          const mesesDec = Math.max(1, mesesCalendario(c.inicio, new Date().toISOString()));
          novasQtds[it.id] = Math.round((it.qtd_acum||0) / mesesDec);
        } else {
          novasQtds[it.id] = '';
        }
      }
    });
    setPedidoQtds(novasQtds);
  }, [pedidoContrato, pedidoBase, itens, contratos]);

  const gerarRelatorioMensal = () => {
    const mesRef = mesToPT(relatorioMes);
    const [ry, rm] = relatorioMes.split('-').map(Number);
    const mesCurto = (mes) => { const [y,m] = mes.split('-'); const nomes=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']; return nomes[parseInt(m)]+'/'+y.slice(2); };

    // Status das medições (mesma lógica do Painel)
    const statusMedicoesRel = contratos.map(c => {
      const execsContrato = execucoes.filter(e => e.contrato_id === c.id && e.mes_referencia <= relatorioMes);
      const ultimoMes = execsContrato.length ? execsContrato.map(e=>e.mes_referencia).sort().slice(-1)[0] : null;
      let cls='vermelho', label='Nunca medido', mesesAtraso=null;
      if (ultimoMes) {
        const [uy,um] = ultimoMes.split('-').map(Number);
        mesesAtraso = (ry - uy)*12 + (rm - um);
        if (mesesAtraso<=1) { cls='verde'; label='Em dia'; }
        else if (mesesAtraso===2) { cls='amarelo'; label='Atenção · 1 mês atrasado'; }
        else { cls='vermelho'; label=`Atrasada · ${mesesAtraso-1}m`; }
      }
      return { c, ultimoMes, cls, label };
    });
    const emDiaCount = statusMedicoesRel.filter(s=>s.cls==='verde').length;
    const atencaoCount = statusMedicoesRel.filter(s=>s.cls==='amarelo').length;
    const atrasadoCount = statusMedicoesRel.filter(s=>s.cls==='vermelho').length;
    const statusAtencao = statusMedicoesRel.filter(s=>s.cls!=='verde').sort((a,b)=> a.cls===b.cls?0:(a.cls==='vermelho'?-1:1));

    // Contratos vencendo em breve
    const vencendo = contratos.filter(c => { const d = dias(c.fim); return d<=90; }).sort((a,b)=>dias(a.fim)-dias(b.fim));

    // Aditivo/supressão: tratado à parte na aba "Aditivos e Supressões" (que já
    // filtra só o risco real). Aqui no relatório não repetimos essa análise.

    // Aditivo/supressão — indicativo condensado por contrato (mesma lógica da aba
    // Aditivos e Supressões), pra apoiar a decisão do gestor sem virar tabela extensa.
    const analiseReequilibrioRel = contratos.map(c => {
      const itensC = itens.filter(i => i.contrato_id === c.id);
      const deficit = [], superavit = [];
      itensC.forEach(it => {
        const a = calcAnaliseItem(c, it);
        if (!a) return;
        const valor = Math.abs(a.dif) * (it.vlr_unitario || 0);
        if (a.acao === 'ADITIVO') deficit.push({ item: it, dif: a.dif, valor });
        else if (a.acao === 'SUPRESSÃO') superavit.push({ item: it, dif: a.dif, valor });
      });
      if (!deficit.length) return null;
      const totalFalta = deficit.reduce((acc,d)=>acc+d.valor,0);
      const alocacoes = alocarReequilibrio(deficit, superavit);
      const totalCobertoPorReequilibrio = alocacoes.reduce((acc,a)=>acc+a.valor,0);
      const podeReequilibrar = totalCobertoPorReequilibrio >= totalFalta - 0.01;
      return { contrato:c, totalFalta, podeReequilibrar, valorAditivoNecessario: Math.max(0,totalFalta-totalCobertoPorReequilibrio) };
    }).filter(Boolean);

    // Rubrica (reaproveita a mesma lógica de renderRubrica, recalculada aqui pro mês do relatório)
    const itensComRubrica = itens.filter(it => it.rubrica);
    const rubricasRel = [...new Set(itensComRubrica.map(it => it.rubrica))].map(rub => {
      const info = rubricaInfo(rub);
      const itensRub = itensComRubrica.filter(it => it.rubrica === rub);
      const executado = itensRub.reduce((acc, it) => {
        const hg = medicoesItensHist.filter(mi => mi.item_id===it.id && mi.mes_referencia===relatorioMes).reduce((a,mi)=>a+(mi.qtd_executada||0)*(mi.vlr_unitario||it.vlr_unitario||0),0);
        const hm = lancamentos.filter(l => l.item_id===it.id && l.mes_referencia===relatorioMes).reduce((a,l)=>a+(l.quantidade||0)*(l.valor_unitario||it.vlr_unitario||0),0);
        return acc+hg+hm;
      }, 0);
      const tetoMensal = info?.mensal || 0;
      return { rub, desc:info?.desc||'', tetoMensal, executado, pct: tetoMensal>0?Math.round((executado/tetoMensal)*100):0 };
    }).sort((a,b) => b.pct - a.pct);
    const rubricasCriticas = rubricasRel.filter(r=>r.pct>=70);
    const piorRubrica = rubricasRel[0];

    // Evolução do valor executado — últimos 6 meses (soma de todos os contratos)
    const mesesEvolucao = [];
    for (let i=5;i>=0;i--) { const d = new Date(ry, rm-1-i, 1); mesesEvolucao.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')); }
    const evolucaoMensal = mesesEvolucao.map(m => ({ label: mesCurto(m), valor: execucoes.filter(e=>e.mes_referencia===m).reduce((a,e)=>a+(e.valor||0),0) }));
    const totalExecutadoMes = execucoes.filter(e=>e.mes_referencia===relatorioMes).reduce((a,e)=>a+(e.valor||0),0);

    // ── Resumo executivo (texto corrido) ────────────────────────────────
