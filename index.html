      const inicioC = new Date(c.inicio);
      const mesesTot = c.vigencia_meses || mesesCalendario(c.inicio, c.fim);
      const mesesDec = Math.max(1, Math.min(mesesTot, mesesCalendario(c.inicio, hoje.toISOString())));
      const mesesRest = Math.max(0, mesesTot - mesesDec);
      itens.filter(i=>i.contrato_id===c.id).forEach(it=>{
        const media = it.qtd_acum/mesesDec;
        const proj = Math.round(media*mesesRest);
        const qtdTot = it.qtd_total_contratada || (it.qtd_mensal*mesesTot);
        const saldo = Math.round(qtdTot-it.qtd_acum);
        const dif = Math.round(saldo-proj);
        const pct = qtdTot>0?Math.min(Math.round((it.qtd_acum/qtdTot)*100),100):0;
        const mensalReal = it.qtd_total_contratada ? (it.qtd_total_contratada/mesesTot) : it.qtd_mensal;
        const acao = dif<-1?'ADITIVO':dif>mensalReal*2?'SUPRESSÃO':'OK';
        analise.push({contrato:c.numero,item:it.item,qtdMensal:it.qtd_mensal,
          qtdAcum:it.qtd_acum,qtdTot:Math.round(qtdTot),saldo,
          media:media.toFixed(1),mesesRest,proj,dif,acao,pct});
      });
    });
    const aditivo = analise.filter(a=>a.acao==='ADITIVO').sort((a,b)=>a.dif-b.dif);
    const supressao = analise.filter(a=>a.acao==='SUPRESSÃO').sort((a,b)=>b.dif-a.dif);
    const ok = analise.filter(a=>a.acao==='OK');
    const Head = () => <thead><tr><th>Contrato</th><th>Item</th><th>Qtd/mês</th><th>Acumulado</th><th>Saldo atual</th><th>Média/mês</th><th>Meses rest.</th><th>Projeção</th><th>Diferença</th><th>% consumido</th><th>Ação</th></tr></thead>;
    const Row = ({a}) => <tr>
      <td className="mono"><strong>{a.contrato}</strong></td>
      <td style={{maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:11.5}}>{a.item}</td>
      <td style={{textAlign:'center'}}>{a.qtdMensal}</td>
      <td style={{textAlign:'center'}}>{a.qtdAcum}</td>
      <td style={{textAlign:'center',fontWeight:600,color:a.saldo<0?'#b91c1c':'var(--text)'}}>{a.saldo}</td>
      <td style={{textAlign:'center'}}>{a.media}</td>
      <td style={{textAlign:'center'}}>{a.mesesRest}</td>
      <td style={{textAlign:'center',fontWeight:600}}>{a.proj}</td>
      <td style={{textAlign:'center',fontWeight:700,color:a.acao==='ADITIVO'?'#b91c1c':a.acao==='SUPRESSÃO'?'#92400e':'#16a34a'}}>{a.dif>0?'+':''}{a.dif}</td>
      <td style={{minWidth:90}}><ProgBar p={a.pct}/></td>
      <td>{a.acao==='ADITIVO'&&<span className="badge vermelho">⚠ Aditivo</span>}{a.acao==='SUPRESSÃO'&&<span className="badge amarelo">↓ Supressão</span>}{a.acao==='OK'&&<span className="badge verde">✓ OK</span>}</td>
    </tr>;
    return <>
      <div className="cards-grid">
        <div className={`stat-card ${aditivo.length>0?'vermelho':'verde'}`}><div className="s-val">{aditivo.length}</div><div className="s-label">Precisam de aditivo</div><div className="s-sub">vai faltar antes do fim</div></div>
        <div className={`stat-card ${supressao.length>0?'amarelo':'verde'}`}><div className="s-val">{supressao.length}</div><div className="s-label">Indicados para supressão</div><div className="s-sub">vai sobrar ao fim do contrato</div></div>
        <div className="stat-card verde"><div className="s-val">{ok.length}</div><div className="s-label">Itens equilibrados</div><div className="s-sub">consumo dentro do esperado</div></div>
        <div className="stat-card azul"><div className="s-val">{analise.length}</div><div className="s-label">Total analisado</div><div className="s-sub">em {contratos.length} contratos</div></div>
      </div>
      <div className="panel"><div className="panel-head"><h2><i className="fa-solid fa-circle-info"/>Como a análise funciona</h2></div>
        <div className="panel-body" style={{fontSize:12.5,color:'var(--text2)',lineHeight:1.8}}>
          <strong style={{color:'var(--text)'}}>Média real/mês</strong> = quantidade acumulada ÷ meses decorridos desde o início<br/>
          <strong style={{color:'var(--text)'}}>Projeção</strong> = média real × meses restantes até o fim do contrato<br/>
          <strong style={{color:'var(--text)'}}>Diferença</strong> = saldo atual − projeção de consumo<br/>
          <span style={{color:'#b91c1c',fontWeight:600}}>⚠ Aditivo</span>: diferença negativa — vai faltar antes do vencimento<br/>
          <span style={{color:'#92400e',fontWeight:600}}>↓ Supressão</span>: vai sobrar mais de 2 meses de consumo — pode suprimir e remanejar
        </div>
      </div>
      {aditivo.length>0&&<div className="panel"><div className="panel-head"><h2><i className="fa-solid fa-triangle-exclamation" style={{color:'#ef4444'}}/>Precisam de ADITIVO ({aditivo.length})</h2><button className="btn btn-danger btn-sm" onClick={()=>openModal('aditivo')}><i className="fa-solid fa-plus"/> Registrar aditivo</button></div><div className="tbl-wrap"><table><Head/><tbody>{aditivo.map((a,i)=><Row key={i} a={a}/>)}</tbody></table></div></div>}
      {supressao.length>0&&<div className="panel"><div className="panel-head"><h2><i className="fa-solid fa-arrow-down" style={{color:'#f59e0b'}}/>Indicados para SUPRESSÃO ({supressao.length})</h2><button className="btn btn-secondary btn-sm" onClick={()=>openModal('aditivo')}><i className="fa-solid fa-plus"/> Registrar supressão</button></div><div className="tbl-wrap"><table><Head/><tbody>{supressao.map((a,i)=><Row key={i} a={a}/>)}</tbody></table></div></div>}
      {ok.length>0&&<div className="panel"><div className="panel-head"><h2><i className="fa-solid fa-circle-check" style={{color:'#22c55e'}}/>Itens equilibrados ({ok.length})</h2></div><div className="tbl-wrap"><table><Head/><tbody>{ok.map((a,i)=><Row key={i} a={a}/>)}</tbody></table></div></div>}
    </>;
  };

  const navItems = [
    { sec:'painel', icon:'fa-gauge-high', label:'Painel executivo', group:'main' },
    { sec:'contratos', icon:'fa-file-contract', label:'Contratos', group:'main' },
    { sec:'financeiro', icon:'fa-circle-dollar-to-slot', label:'Controle financeiro', group:'controles' },
    { sec:'quantidade', icon:'fa-boxes-stacked', label:'Controle de quantidade', group:'controles' },
    { sec:'prazo', icon:'fa-calendar-days', label:'Controle de prazo', group:'controles' },
    { sec:'aditivos', icon:'fa-file-pen', label:'Aditivos e supressões', group:'gestao' },
    { sec:'medicao', icon:'fa-file-invoice-dollar', label:'Medições mensais', group:'gestao' },
    { sec:'historico', icon:'fa-clock-rotate-left', label:'Histórico de medições', group:'gestao' },
    { sec:'rubrica', icon:'fa-scale-balanced', label:'Consumo por rubrica', group:'gestao' },
    { sec:'relatorio', icon:'fa-file-lines', label:'Relatório mensal', group:'gestao' },
    { sec:'pedido', icon:'fa-cart-shopping', label:'Pedido de compra', group:'gestao' },
  ];

  const sectionTitles = { painel:'Painel Executivo', contratos:'Contratos', financeiro:'Controle Financeiro', quantidade:'Controle de Quantidade', prazo:'Controle de Prazo', preditiva:'Análise Preditiva', aditivos:'Aditivos e Supressões', medicao:'Medições Mensais', historico:'Histórico de Medições', rubrica:'Consumo por Rubrica', relatorio:'Relatório Mensal', pedido:'Pedido de Compra' };

  if (!configured) return (
    <div style={{minHeight:'100vh',background:'#EEF2F6'}}>
      <div style={{background:'var(--teal-d)',padding:'16px 20px',display:'flex',alignItems:'center',gap:10}}>
        <img src={`data:image/png;base64,${LOGO_B64}`} style={{width:100,filter:'brightness(0) invert(1)'}} alt="Logo" />
        <div style={{color:'rgba(255,255,255,.7)',fontSize:12}}>SisContratos HMC · Hospital Municipal de Cordeiro</div>
      </div>
      <ConfigScreen onSave={handleConfig} />
    </div>
  );

  return (
    <>
      <aside className="sidebar">
        <div className="sidebar-brand">
          <img src={`data:image/png;base64,${LOGO_B64}`} className="sidebar-logo" alt="Prima Qualitá Saúde" />
          <div className="sidebar-sub"><strong>SisContratos HMC</strong>Fiscalização de Contratos</div>
        </div>
        <div className="nav-sec">Navegação</div>
        {navItems.filter(n=>n.group==='main').map(n => (
          <button key={n.sec} className={`nav-btn${section===n.sec?' active':''}`} onClick={() => setSection(n.sec)}>
            <i className={`fa-solid ${n.icon}`} /> {n.label}
          </button>
        ))}
        <div className="nav-sec">Controles</div>
        {navItems.filter(n=>n.group==='controles').map(n => (
          <button key={n.sec} className={`nav-btn${section===n.sec?' active':''}`} onClick={() => setSection(n.sec)}>
            <i className={`fa-solid ${n.icon}`} /> {n.label}
          </button>
        ))}
        <div className="nav-sec">Gestão</div>
        {navItems.filter(n=>n.group==='gestao').map(n => (
          <button key={n.sec} className={`nav-btn${section===n.sec?' active':''}`} onClick={() => setSection(n.sec)}>
            <i className={`fa-solid ${n.icon}`} /> {n.label}
          </button>
        ))}
        <div className="sidebar-foot">
          <div className="user-row">
            <div className="user-av">MD</div>
            <div>
              <div className="user-name">Mírian V. Dias</div>
              <div className="user-role">Diretora Administrativa · Fiscal</div>
            </div>
          </div>
        </div>
      </aside>

      <div className="main">
        <div className="topbar">
          <div><h1>{sectionTitles[section]}</h1><p>Hospital Municipal de Cordeiro · Contrato de Gestão nº 196/2025</p></div>
          <div className="topbar-right">
            <div className={`sync-indicator ${syncStatus}`}>
              {syncStatus==='loading' && <i className="fa-solid fa-rotate spin" />}
              {syncStatus==='ok' && <i className="fa-solid fa-cloud" />}
              {syncStatus==='err' && <i className="fa-solid fa-cloud-xmark" />}
              {syncStatus==='loading'?'Sincronizando...':syncStatus==='ok'?'Sincronizado':'Erro de conexão'}
            </div>
            <button className="btn btn-secondary btn-sm" onClick={loadAll}><i className="fa-solid fa-rotate" /> Atualizar</button>
            <button className="btn btn-primary" onClick={() => openModal('novo')}><i className="fa-solid fa-plus" /> Novo contrato</button>
          </div>
        </div>

        <div className="content">
          {section === 'painel' && renderPainel()}
          {section === 'contratos' && renderContratos()}
          {section === 'financeiro' && (
            <>
              <select className="sel-contract" value={selFin} onChange={e => setSelFin(e.target.value)}>
                <option value="">— Selecione um contrato —</option>
                {contratos.map(c => <option key={c.id} value={c.id}>{c.numero} · {c.empresa.substring(0,34)}</option>)}
              </select>
              {selFin && renderFinanceiro()}
            </>
          )}
          {section === 'quantidade' && (
            <>
              <select className="sel-contract" value={selQtd} onChange={e => setSelQtd(e.target.value)}>
                <option value="">— Selecione um contrato —</option>
                {contratos.map(c => <option key={c.id} value={c.id}>{c.numero} · {c.empresa.substring(0,34)}</option>)}
              </select>
              {selQtd && renderQuantidade()}
            </>
          )}
          {section === 'prazo' && renderPrazo()}
          {section === 'preditiva' && renderPreditiva()}
          {section === 'aditivos' && renderAditivos()}
          {section === 'medicao' && renderMedicao()}
          {section === 'historico' && renderHistorico()}
          {section === 'rubrica' && renderRubrica()}
          {section === 'relatorio' && renderRelatorio()}
          {section === 'pedido' && renderPedido()}
        </div>
      </div>

      {pendenteRegistro && (
        <div style={{position:'fixed',bottom:20,left:'50%',transform:'translateX(-50%)',zIndex:2000,background:'#fff',borderRadius:10,boxShadow:'0 12px 40px rgba(0,0,0,.25)',border:'1px solid var(--gray-b)',padding:'14px 18px',display:'flex',alignItems:'center',gap:16,maxWidth:560}}>
          <i className="fa-solid fa-file-circle-check" style={{fontSize:22,color:'var(--teal)'}} />
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13}}>Medição gerada — {pendenteRegistro.numero} · {pendenteRegistro.mesLabel}</div>
            <div style={{fontSize:12,color:'var(--text2)'}}>Total: {brl(pendenteRegistro.totalGeral)} — deseja registrar e atualizar os saldos?</div>
          </div>
          <button className="btn btn-secondary btn-sm" onClick={()=>setPendenteRegistro(null)} disabled={saving}>Descartar</button>
          <button className="btn btn-primary btn-sm" onClick={pendenteRegistro.executar} disabled={saving}>
            {saving ? <><i className="fa-solid fa-rotate spin" /> Salvando...</> : <><i className="fa-solid fa-floppy-disk" /> Registrar</>}
          </button>
        </div>
      )}

      {modal && (
        <Modal
          title={modal.tipo==='editar'?`Editar — ${contratos.find(x=>x.id===modal.id)?.numero||''}`:modalConfig[modal.tipo]?.title}
          icon={modalConfig[modal.tipo]?.icon||'fa-file'}
          onClose={closeModal}
          footer={
            <>
              <button className="btn btn-secondary" onClick={closeModal}>Cancelar</button>
              {modalConfig[modal.tipo]?.onSave && (
                <button className="btn btn-primary" onClick={modalConfig[modal.tipo].onSave} disabled={saving}>
                  {saving ? <><i className="fa-solid fa-rotate spin" /> Salvando...</> : <><i className="fa-solid fa-floppy-disk" /> Salvar</>}
                </button>
              )}
            </>
          }
        >
          {renderModalContent()}
        </Modal>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
