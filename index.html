<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SisContratos HMC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --teal:#1D9E75;--teal-d:#0F6E56;--teal-l:#E1F5EE;--teal-m:#5DCAA5;
  --blue:#178DBB;--blue-d:#0C6690;--blue-l:#E0F4FB;
  --gray:#F4F6F8;--gray-d:#8A96A3;--gray-b:#DDE3E9;
  --text:#1C2B35;--text2:#56687A;--text3:#8A96A3;
  --white:#FFFFFF;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 0.5px rgba(0,0,0,.06);
  --radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#EEF2F6;color:var(--text);font-size:13px;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:224px;height:100vh;background:var(--teal-d);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sidebar-brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.12)}
.sidebar-logo{width:128px;margin-bottom:10px;filter:brightness(0) invert(1)}
.sidebar-sub{font-size:10.5px;color:rgba(255,255,255,.55);line-height:1.5}
.sidebar-sub strong{display:block;color:#fff;font-size:12px;font-weight:600;margin-bottom:1px}
.nav-sec{padding:10px 10px 3px;font-size:9.5px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 14px;margin:1px 6px;border-radius:6px;cursor:pointer;color:rgba(255,255,255,.72);font-size:12.5px;transition:all .14s;border:none;background:none;width:calc(100% - 12px);text-align:left}
.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-btn.active{background:rgba(255,255,255,.18);color:#fff;font-weight:600}
.nav-btn i{font-size:13px;width:17px;text-align:center}
.sidebar-foot{margin-top:auto;padding:12px 14px 16px;border-top:1px solid rgba(255,255,255,.1)}
.user-row{display:flex;align-items:center;gap:9px}
.user-av{width:34px;height:34px;border-radius:50%;background:var(--teal-m);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:11.5px;color:#fff;font-weight:600;line-height:1.3}
.user-role{font-size:10px;color:rgba(255,255,255,.45)}
.main{margin-left:224px;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--gray-b);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.topbar h1{font-size:15.5px;font-weight:700;color:var(--text)}
.topbar p{font-size:11px;color:var(--text2);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.sync-indicator{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);padding:4px 10px;border-radius:20px;background:var(--gray)}
.sync-indicator.ok{color:#16a34a;background:#dcfce7}
.sync-indicator.err{color:#b91c1c;background:#fee2e2}
.sync-indicator.loading{color:var(--blue-d);background:var(--blue-l)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:12.5px;font-weight:500;transition:all .14s;white-space:nowrap}
.btn-primary{background:var(--teal);color:#fff}.btn-primary:hover{background:var(--teal-d)}
.btn-secondary{background:var(--white);color:var(--text2);border:1px solid var(--gray-b)}.btn-secondary:hover{background:var(--gray)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
.content{padding:20px 22px;flex:1}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:11px;margin-bottom:18px}
.stat-card{background:#fff;border-radius:var(--radius);padding:15px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.stat-card.verde::before{background:#22c55e}
.stat-card.amarelo::before{background:#f59e0b}
.stat-card.laranja::before{background:#f97316}
.stat-card.vermelho::before{background:#ef4444}
.stat-card.azul::before{background:var(--blue)}
.s-val{font-size:26px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px}
.s-label{font-size:11px;color:var(--text2)}
.s-sub{font-size:10.5px;color:var(--text3);margin-top:2px}
.panel{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px}
.panel-head{padding:13px 17px;border-bottom:1px solid var(--gray-b);display:flex;align-items:center;justify-content:space-between}
.panel-head h2{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:7px;color:var(--text)}
.panel-head h2 i{color:var(--teal)}
.panel-body{padding:14px 17px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10.5px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;padding:9px 11px;background:var(--gray);border-bottom:1px solid var(--gray-b);white-space:nowrap}
td{padding:9px 11px;border-bottom:1px solid var(--gray-b);vertical-align:middle;font-size:12.5px;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFD}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.badge.verde{background:#dcfce7;color:#15803d}
.badge.amarelo{background:#fef3c7;color:#92400e}
.badge.laranja{background:#ffedd5;color:#9a3412}
.badge.vermelho{background:#fee2e2;color:#991b1b}
.badge.azul{background:var(--blue-l);color:var(--blue-d)}
.badge.cinza{background:var(--gray);color:var(--text2)}
.prog-wrap{display:flex;align-items:center;gap:7px}
.prog-bar{flex:1;height:7px;background:var(--gray-b);border-radius:4px;overflow:hidden;min-width:55px}
.prog-fill{height:100%;border-radius:4px;transition:width .3s}
.prog-fill.verde{background:#22c55e}.prog-fill.amarelo{background:#f59e0b}
.prog-fill.laranja{background:#f97316}.prog-fill.vermelho{background:#ef4444}
.prog-pct{font-size:11.5px;font-weight:600;min-width:34px;text-align:right}
.alert-box{display:flex;gap:9px;padding:11px 13px;border-radius:6px;font-size:12px;margin-bottom:7px;align-items:flex-start}
.alert-box i{font-size:13px;margin-top:1px;flex-shrink:0}
.alert-box.verde{background:#dcfce7;color:#15803d;border-left:3px solid #22c55e}
.alert-box.amarelo{background:#fef3c7;color:#92400e;border-left:3px solid #f59e0b}
.alert-box.laranja{background:#ffedd5;color:#9a3412;border-left:3px solid #f97316}
.alert-box.vermelho{background:#fee2e2;color:#991b1b;border-left:3px solid #ef4444}
.deadline-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--gray-b)}
.deadline-item:last-child{border-bottom:none}
.dl-name{font-size:12.5px;font-weight:600}
.dl-emp{font-size:11px;color:var(--text2);margin-top:1px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:var(--radius);width:min(640px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.28)}
.modal-head{padding:15px 19px;border-bottom:1px solid var(--gray-b);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-head h3{font-size:14.5px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text)}
.modal-head h3 i{color:var(--teal)}
.modal-body{padding:19px}
.modal-foot{padding:13px 19px;border-top:1px solid var(--gray-b);display:flex;justify-content:flex-end;gap:8px;background:#FAFBFD;position:sticky;bottom:0}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:17px;padding:4px;border-radius:4px}
.close-btn:hover{background:var(--gray)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.form-row.cols3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
label{font-size:11px;font-weight:600;color:var(--text2)}
input,select,textarea{font-size:12.5px;padding:7px 9px;border:1px solid var(--gray-b);border-radius:5px;background:#fff;color:var(--text);width:100%;outline:none;transition:border .14s}
input:focus,select:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(29,158,117,.12)}
input[disabled],select[disabled],textarea[disabled]{background:var(--gray);color:var(--text2)}
textarea{resize:vertical;min-height:68px}
.sec-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:8px 0 5px;border-bottom:1px solid var(--gray-b);margin-bottom:9px;grid-column:1/-1}
.act-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:4px;color:var(--text2);font-size:12.5px;transition:all .14s}
.act-btn:hover{background:var(--gray);color:var(--teal)}
.act-btn.del:hover{color:#ef4444}
.empty{text-align:center;padding:32px 20px;color:var(--text2)}
.empty i{font-size:28px;color:var(--gray-d);margin-bottom:8px;display:block}
.sel-contract{width:100%;padding:8px 10px;border:1px solid var(--gray-b);border-radius:6px;font-size:13px;margin-bottom:14px;background:#fff;color:var(--text)}
.cell-m{color:var(--text2);font-size:12px}
.mono{font-family:'Courier New',monospace;font-size:12px}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 17px 13px;border-top:1px solid var(--gray-b)}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.leg-dot{width:9px;height:9px;border-radius:50%}
.spin{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.config-box{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;max-width:500px;margin:40px auto}
.config-box h2{font-size:16px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.config-box h2 i{color:var(--teal)}
.config-box p{color:var(--text2);font-size:12.5px;margin-bottom:18px;line-height:1.6}
.config-box input{margin-bottom:10px}
.config-hint{font-size:11px;color:var(--text3);margin-top:12px;padding:10px;background:var(--gray);border-radius:5px;line-height:1.6}
</style>
</head>

// Converte DD/MM/AAAA → YYYY-MM-DD (aceita também YYYY-MM-DD direto)
const toISO = (val) => {
  if (!val) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
  const p = val.split('/');
  if (p.length === 3 && p[2].length === 4) return p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
  return val;
};
// Converte YYYY-MM-DD → DD/MM/AAAA para exibição nos campos
const fromISO = (val) => {
  if (!val) return '';
  if (val.includes('/')) return val;
  const p = val.substring(0,10).split('-');
  if (p.length === 3) return p[2]+'/'+p[1]+'/'+p[0];
  return val;
};

// ─── GRÁFICOS (Chart.js) ──────────────────────────────────────────────────────
const CHART_COLORS = ['#1D9E75','#178DBB','#f59e0b','#ef4444','#8B5CF6','#f97316','#0EA5E9','#22c55e'];
function useChart(canvasRef, config, deps) {
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || typeof Chart === 'undefined') return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    chartRef.current = new Chart(canvasRef.current, config);
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, deps);
}
function BarChart({ labels, data, label, color, height }) {
  const canvasRef = useRef(null);
  useChart(canvasRef, {
    type: 'bar',
    data: { labels, datasets: [{ label: label||'', data, backgroundColor: color||'#1D9E75', borderRadius:5, maxBarThickness:38 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{ beginAtZero:true, grid:{color:'#EEF2F6'} }, x:{ grid:{display:false} } } }
  }, [JSON.stringify(labels), JSON.stringify(data), color]);
  return <div style={{height:height||220}}><canvas ref={canvasRef}></canvas></div>;
}
function LineChart({ labels, data, label, color, height }) {
  const canvasRef = useRef(null);
  useChart(canvasRef, {
    type: 'line',
    data: { labels, datasets: [{ label: label||'', data, borderColor: color||'#178DBB', backgroundColor: (color||'#178DBB')+'22', fill:true, tension:0.3, pointRadius:3 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{ beginAtZero:true, grid:{color:'#EEF2F6'} }, x:{ grid:{display:false} } } }
  }, [JSON.stringify(labels), JSON.stringify(data), color]);
  return <div style={{height:height||220}}><canvas ref={canvasRef}></canvas></div>;
}
function DoughnutChart({ labels, data, colors, height }) {
  const canvasRef = useRef(null);
  useChart(canvasRef, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors||CHART_COLORS, borderWidth:2, borderColor:'#fff' }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{boxWidth:11,font:{size:11}}}} }
  }, [JSON.stringify(labels), JSON.stringify(data)]);
  return <div style={{height:height||220}}><canvas ref={canvasRef}></canvas></div>;
}
function HorizontalBarChart({ labels, data, color, height }) {
  const canvasRef = useRef(null);
  useChart(canvasRef, {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: color||'#178DBB', borderRadius:4, maxBarThickness:22 }] },
    options: { indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ beginAtZero:true, grid:{color:'#EEF2F6'} }, y:{ grid:{display:false} } } }

}

// Compara % do prazo decorrido vs % do valor consumido, lado a lado, por contrato —
// responde direto "esse contrato está gastando mais rápido do que o prazo permite?"
function ComparativoPrazoValorChart({ labels, prazo, valor, height }) {
  const canvasRef = useRef(null);
  useChart(canvasRef, {
    type: 'bar',
    data: { labels, datasets: [
      { label:'% do prazo decorrido', data:prazo, backgroundColor:'#b5d4f4', borderRadius:4, maxBarThickness:16 },

// ─── GRÁFICOS SVG PARA O RELATÓRIO IMPRESSO (PDF) ─────────────────────────
// Não usamos Chart.js aqui porque a janela de impressão é um documento HTML
// isolado (window.open) sem os scripts do app — SVG inline garante que o
// gráfico já nasce pronto no papel, sem depender de timing de renderização.
function svgBarrasHorizontaisPDF(dados, opts={}) {
  const largura = opts.largura || 680;
  const alturaBarra = 18, gap = 9, margemEsq = opts.margemEsq || 230, margemDir = 46;
  const maxValor = Math.max(...dados.map(d=>d.pct), 10);
  const alturaTotal = dados.length*(alturaBarra+gap)+6;
  const escala = (largura-margemEsq-margemDir)/maxValor;
  const linhas = dados.map((d,i) => {
    const y = i*(alturaBarra+gap)+3;
    const w = Math.max(2, Math.min(d.pct, maxValor)*escala);
    const cor = d.pct>=100?'#ef4444':d.pct>=85?'#f59e0b':d.pct>=70?'#eab308':'#22c55e';
    const rotulo = d.label.length>34 ? d.label.slice(0,33)+'…' : d.label;
    return `<text x="${margemEsq-8}" y="${y+alturaBarra/2+3.5}" text-anchor="end" font-size="9" font-family="Arial">${rotulo}</text>
      <rect x="${margemEsq}" y="${y}" width="${largura-margemEsq-margemDir}" height="${alturaBarra}" fill="#EEF2F6" rx="3"/>
      <rect x="${margemEsq}" y="${y}" width="${w}" height="${alturaBarra}" fill="${cor}" rx="3"/>
      <text x="${largura-margemDir+6}" y="${y+alturaBarra/2+3.5}" font-size="9" font-family="Arial" font-weight="bold">${d.pct}%</text>`;
  }).join('');
  return `<svg width="${largura}" height="${alturaTotal}" xmlns="http://www.w3.org/2000/svg">${linhas}</svg>`;
}

function svgLinhaEvolucaoPDF(pontos, opts={}) {
  const largura = opts.largura || 680, altura = opts.altura || 160;
  const margemEsq = 66, margemDir = 20, margemTopo = 18, margemBase = 26;
  const maxValor = Math.max(...pontos.map(p=>p.valor), 1);
  const passoX = pontos.length>1 ? (largura-margemEsq-margemDir)/(pontos.length-1) : 0;
  const escalaY = (altura-margemTopo-margemBase)/maxValor;
  const coords = pontos.map((p,i) => ({ x: margemEsq+i*passoX, y: altura-margemBase-p.valor*escalaY }));
  const path = coords.map((c,i)=> (i===0?'M':'L')+c.x.toFixed(1)+','+c.y.toFixed(1)).join(' ');
  const area = coords.length ? `${path} L${coords[coords.length-1].x.toFixed(1)},${altura-margemBase} L${coords[0].x.toFixed(1)},${altura-margemBase} Z` : '';
  const linhasGrade = [0.25,0.5,0.75,1].map(f => {
    const y = altura-margemBase-(maxValor*f)*escalaY;
    return `<line x1="${margemEsq}" y1="${y.toFixed(1)}" x2="${largura-margemDir}" y2="${y.toFixed(1)}" stroke="#EEF2F6" stroke-width="1"/>`;
  }).join('');
  const pontosSvg = coords.map(c=>`<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="3" fill="#0F6E56"/>`).join('');
  const valoresSvg = pontos.map((p,i)=>`<text x="${coords[i].x.toFixed(1)}" y="${(coords[i].y-8).toFixed(1)}" text-anchor="middle" font-size="8" font-family="Arial" font-weight="bold">${(p.valor/1000).toLocaleString('pt-BR',{maximumFractionDigits:0})}k</text>`).join('');
  const labelsSvg = pontos.map((p,i)=>`<text x="${coords[i].x.toFixed(1)}" y="${altura-7}" text-anchor="middle" font-size="8.5" font-family="Arial">${p.label}</text>`).join('');
  return `<svg width="${largura}" height="${altura}" xmlns="http://www.w3.org/2000/svg">
    ${linhasGrade}
    <path d="${area}" fill="#0F6E5622" stroke="none"/>
    <path d="${path}" fill="none" stroke="#0F6E56" stroke-width="2"/>
    ${pontosSvg}${valoresSvg}${labelsSvg}
  </svg>`;
}

        <div className="form-group" style={{marginBottom:16}}>
          <label>Chave anon (public)</label>
          <input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJhbGciOiJIUzI1NiIs..." type="password" />
        </div>
        <button className="btn btn-primary" style={{width:'100%'}} onClick={save}><i className="fa-solid fa-plug" /> Conectar</button>
        <div className="config-hint">
          <strong>Como encontrar:</strong> Supabase → seu projeto → Settings → API<br/>
          Copie a <em>Project URL</em> e a <em>anon public</em> key.
        </div>
      </div>
    </div>
  );
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function Modal({ title, icon, onClose, children, footer }) {
  return (
    <div className="modal-overlay" onClick={e => e.target.className.includes('modal-overlay') && onClose()}>
      <div className="modal">
        <div className="modal-head">
          <h3><i className={`fa-solid ${icon}`} /> {title}</h3>
          <button className="close-btn" onClick={onClose}><i className="fa-solid fa-xmark" /></button>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-foot">{footer}</div>}
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [sbUrl, setSbUrl] = useState(localStorage.getItem(STORAGE_KEYS.url)||'');
  const [sbKey, setSbKey] = useState(localStorage.getItem(STORAGE_KEYS.key)||'');
  const [configured, setConfigured] = useState(!!(sbUrl && sbKey));
  const sbRef = useRef(null);

  const [section, setSection] = useState('painel');
  const [syncStatus, setSyncStatus] = useState('ok'); // ok | loading | err
  const [contratos, setContratos] = useState([]);
  const [itens, setItens] = useState([]);
  const [aditivos, setAditivos] = useState([]);
  const [medicos, setMedicos] = useState([]); // cadastro de médicos (roster que cresce), usado no Radiocom
  const [lancamentos, setLancamentos] = useState([]); // medicoes_lancamentos: quem trabalhou, quando, quanto
  const [execucoes, setExecucoes] = useState([]); // histórico de medições (1 linha por contrato+mês)

  const [modal, setModal] = useState(null);
  const [selFin, setSelFin] = useState('');
  const [selQtd, setSelQtd] = useState('');
  const [historicoContrato, setHistoricoContrato] = useState('');
  const [rubricaMes, setRubricaMes] = useState(todayMonth());
  const [rubricaExpandida, setRubricaExpandida] = useState(null);
  const [mesExpandido, setMesExpandido] = useState(null);
  const [confirmarExclusaoChave, setConfirmarExclusaoChave] = useState(null);
  const [filtroAditivoContrato, setFiltroAditivoContrato] = useState('');
  const [buscaAditivo, setBuscaAditivo] = useState('');
  const [formData, setFormData] = useState({});
  const formRef = useRef({});
  const [saving, setSaving] = useState(false);

  const initSb = (url, key) => {
    sbRef.current = createClient(url, key);
  };

  useEffect(() => {
    if (configured) {
      initSb(sbUrl, sbKey);
      loadAll();
    }
  }, [configured]);

  const handleConfig = (url, key) => {
    setSbUrl(url); setSbKey(key);
    initSb(url, key);
    setConfigured(true);
  };

  const sb = () => sbRef.current;

  const loadAll = async () => {
    setSyncStatus('loading');
    try {
      const [c, i, a, m, l, ex, mi] = await Promise.all([
        sb().from('contratos').select('*').order('created_at'),
        sb().from('itens').select('*').order('created_at'),
        sb().from('aditivos').select('*').order('created_at', {ascending:false}),
        sb().from('medicos').select('*').order('nome'),
        sb().from('medicoes_lancamentos').select('*').order('created_at'),
        sb().from('execucoes').select('*').order('mes_referencia'),
        sb().from('medicoes_itens').select('*').order('mes_referencia')
      ]);
      if (c.error || i.error || a.error) throw new Error('Erro ao carregar');
      setContratos(c.data || []);
      setItens((i.data || []).slice().sort((a,b) => (a.ordem||999) - (b.ordem||999)));
      setAditivos(a.data || []);
      if (m.error) console.error('Tabela "medicos":', m.error.message);
      if (l.error) console.error('Tabela "medicoes_lancamentos":', l.error.message);
      setMedicos(m.data || []); // se a tabela ainda não existir ou o RLS bloquear, m.error fica setado e usamos []
      setLancamentos(l.data || []);
      setExecucoes(ex.data || []);

  // form usa ref para não causar re-render ao digitar

  const openModal = (tipo, id) => {

    } else if (tipo === 'editar' || tipo === 'ver') {

      setForm({ contrato_id: id, fim_atual: c.fim?.substring(0,10), novo_prazo: c.fim?.substring(0,10) });

  const closeModal = () => { setModal(null); setForm({}); };

  // SALVAR CONTRATO
  const salvarContrato = async () => {
    if (!fv('numero') || !fv('empresa') || !fv('objeto')) { alert('Preencha Nº, Empresa e Objeto.'); return; }
    setSaving(true);
    const data = {
      id: modal.id || uid('C'), numero: fv('numero'), empresa: fv('empresa'), objeto: fv('objeto'),
      segmento: fv('segmento'), setor: fv('setor'), fiscal: fv('fiscal'), gestor: fv('gestor'),
      inicio: toISO(fv('inicio')) || null, fim: toISO(fv('fim')) || null,
      vlr_mensal: parseFloat(fv('vlr_mensal')) || 0,
      vlr_total: parseFloat(fv('vlr_total')) || 0,
      tipo: fv('tipo'), medicao: fv('medicao'), status: fv('status'),
      consumo_acum: parseFloat(fv('consumo_acum')) || 0,
      vigencia_meses: parseInt(fv('vigencia_meses')) || null,
      updated_at: new Date().toISOString()
    };
    const { error } = await sb().from('contratos').upsert(data);
    if (error) { setSaving(false); alert('Erro ao salvar: ' + error.message); return; }

    // Se o usuário mexeu no seletor de rubrica do contrato, aplica de uma vez
    // a todos os itens — evita ter que editar item por item.
    const rubricaEscolhida = fv('rubrica_aplicar_todos');
    if (rubricaEscolhida !== undefined && rubricaEscolhida !== '__mista__') {
      const { error: errRub } = await sb().from('itens').update({ rubrica: rubricaEscolhida || null }).eq('contrato_id', data.id);
      if (errRub) { setSaving(false); alert('Contrato salvo, mas houve erro ao aplicar a rubrica aos itens: ' + errRub.message); await loadAll(); return; }
    }

    setSaving(false);
    await loadAll(); closeModal();
  };

  // SALVAR ADITIVO
  const salvarAditivo = async () => {
    if (!fv('contrato_id') || !fv('justificativa')) { alert('Selecione o contrato e informe a justificativa.'); return; }
    setSaving(true);
    const data = {
      id: uid('A'), contrato_id: fv('contrato_id'), tipo: fv('tipo'), data: toISO(fv('data')) || today(),
      justificativa: fv('justificativa'), vlr_acrescido: parseFloat(fv('vlr_acrescido')) || 0,
      vlr_suprimido: parseFloat(fv('vlr_suprimido')) || 0,
      novo_prazo: toISO(fv('novo_prazo')) || null, status: fv('status'), obs: fv('obs') || ''
    };
    const { error } = await sb().from('aditivos').insert(data);
    setSaving(false);
    if (error) { alert('Erro: ' + error.message); return; }
    await loadAll(); closeModal();
  };

  // Atualiza qtd_semana ou qtd_fds de um profissional de plantão (Radiocom - só Médico Clínico)
  const atualizarPlantao = async (itemId, campo, valor) => {
    const qtd = parseFloat(valor) || 0;
    const { error } = await sb().from('itens').update({ [campo]: qtd }).eq('id', itemId);
    if (error) { alert('Erro ao salvar: ' + error.message); return; }
    await loadAll();
  };

  // Cadastro de médicos (roster que cresce) — usado nas Medições Mensais do Radiocom
  const addMedicoSeNaoExiste = async (contratoId, nomeBruto) => {
    const nome = (nomeBruto || '').trim();
    if (!nome) return;
    const jaExiste = medicos.some(m => m.contrato_id === contratoId && m.nome.trim().toLowerCase() === nome.toLowerCase());
    if (jaExiste) return;
    const novo = { id: uid('M'), contrato_id: contratoId, nome };
    const { error } = await sb().from('medicos').insert(novo);
    if (error) { alert('Não consegui salvar o médico no cadastro: ' + error.message + '\n\nVerifique se a tabela "medicos" existe e se o RLS permite escrita (veja o SQL de migração).'); return; }
    setMedicos(prev => [...prev, novo]);
  };
  const removerMedico = async (medicoId) => {
    if (!confirm('Remover este médico do cadastro? (não apaga lançamentos já feitos)')) return;
    await sb().from('medicos').delete().eq('id', medicoId);
    setMedicos(prev => prev.filter(m => m.id !== medicoId));
  };

  // Atualiza qtd_exec de um item de quantidade/valor-unitário (demais categorias Radiocom e outros contratos)
  const atualizarQtdExec = async (itemId, valor) => {
    const qtd = parseFloat(valor) || 0;
    const { error } = await sb().from('itens').update({ qtd_exec: qtd }).eq('id', itemId);
    if (error) { alert('Erro ao salvar: ' + error.message); return; }
    await loadAll();
  };

  // SALVAR ITEM
  const salvarItem = async () => {
    if (!fv('item')) { alert('Informe o nome.'); return; }
    setSaving(true);
    // Corrigido: o tipo de cálculo agora é explícito (tipo_calculo), não é mais deduzido
    // de "existe categoria?" — isso corrigia o bug de todas as categorias médicas
    // (Sobreaviso, Eletiva, Ambulatório, RT) serem tratadas como semana/fds.
    const ehSemanaFds = fv('tipo_calculo') === 'semana_fds';
    // Numeração automática: se não informada, usa a próxima ordem livre do contrato
    // (garante que o PDF sempre mostre 1, 2, 3... na ordem certa, não a descrição do item).
    const itensDoContratoAtual = itens.filter(i => i.contrato_id === fv('contrato_id'));
    const proximaOrdem = itensDoContratoAtual.length ? Math.max(...itensDoContratoAtual.map(i=>i.ordem||0)) + 1 : 1;
    const ordemFinal = parseInt(fv('ordem')) || proximaOrdem;
    const data = ehSemanaFds ? {
      id: modal.id && modal.tipo==='editar-item' ? modal.id : uid('I'), contrato_id: fv('contrato_id'), item: fv('item'),
      categoria: fv('categoria') || '', ordem: ordemFinal, lote: fv('lote') || null, rubrica: fv('rubrica') || null,
      tipo_calculo: 'semana_fds', unit: 'plantão',
      vlr_unit_semana: parseFloat(fv('vlr_unit_semana')) || 0,
      vlr_unit_fds: parseFloat(fv('vlr_unit_fds')) || 0,
      qtd_semana: parseFloat(fv('qtd_semana')) || 0,
      qtd_fds: parseFloat(fv('qtd_fds')) || 0,
      qtd_mensal: 0, qtd_exec: 0, qtd_acum: parseFloat(fv('qtd_acum'))||0
    } : {
      id: modal.id && modal.tipo==='editar-item' ? modal.id : uid('I'), contrato_id: fv('contrato_id'), item: fv('item'),
      categoria: fv('categoria') || '', ordem: ordemFinal, lote: fv('lote') || null, rubrica: fv('rubrica') || null,
      tipo_calculo: 'quantidade_unitario',
      qtd_mensal: parseFloat(fv('qtd_mensal')) || 0, qtd_exec: parseFloat(fv('qtd_exec')) || 0,
      qtd_acum: parseFloat(fv('qtd_acum')) || 0, unit: fv('unit') || 'un.',
      vlr_unitario: parseFloat(fv('vlr_unitario')) || 0,
      qtd_total_contratada: parseFloat(fv('qtd_total_contratada')) || null
    };
    const { error } = await sb().from('itens').upsert(data);
    setSaving(false);
    if (error) { alert('Erro: ' + error.message); return; }
    await loadAll(); closeModal();
  };

  // REGISTRAR EXECUCAO
  const salvarExecucao = async () => {
    const vlr = parseFloat(fv('valor')) || 0;
    if (!vlr) { alert('Informe o valor executado.'); return; }
    setSaving(true);
    const cId = fv('contrato_id');
    const c = contratos.find(x => x.id === cId);
    const novoAcum = (c.consumo_acum || 0) + vlr;
    await sb().from('execucoes').insert({ id: uid('E'), contrato_id: cId, mes_referencia: fv('mes_referencia'), valor: vlr, observacao: fv('observacao') });
    await sb().from('contratos').update({ consumo_acum: novoAcum, updated_at: new Date().toISOString() }).eq('id', cId);
    setSaving(false);
    await loadAll(); closeModal();
  };

  // PRORROGAÇÃO
  const salvarProrrog = async () => {
    if (!fv('novo_prazo') || !fv('justificativa')) { alert('Informe o novo prazo e a justificativa.'); return; }
    setSaving(true);
    const cId = fv('contrato_id');
    const novoPrazoISO = toISO(fv('novo_prazo')) || fv('novo_prazo');
    await sb().from('contratos').update({ fim: novoPrazoISO, status: 'em renovacao', updated_at: new Date().toISOString() }).eq('id', cId);
    await sb().from('aditivos').insert({
      id: uid('A'), contrato_id: cId, tipo:'Prorrogação de prazo', data: today(),
      justificativa: fv('justificativa'), vlr_acrescido:0, vlr_suprimido:0,
      novo_prazo: novoPrazoISO, status:'Em análise', obs: fv('obs')||''
    });
    setSaving(false);
    await loadAll(); closeModal();
  };

  // EXCLUIR
  const excluir = async (tabela, id) => {
    if (!confirm(`Excluir este registro? Ação irreversível.`)) return;
    await sb().from(tabela).delete().eq('id', id);
    await loadAll();
  };

  // ─── RENDER SECTIONS ───────────────────────────────────────────────────────
  // Calcula análise preditiva de UM item (usado tanto no painel quanto na quantidade)
  const calcAnaliseItem = (c, it) => {
    if (!c.inicio || !c.fim) return null;
    const hoje = new Date();
    const fimC = new Date(c.fim);
    const inicioC = new Date(c.inicio);
    // vigencia_meses é a fonte confiável (evita o erro de contar 11 meses em contratos
    // tipo 16/08 a 15/08 do ano seguinte, que por conta de data pura arredonda errado).
    const mesesTot = c.vigencia_meses || mesesCalendario(c.inicio, c.fim);
    // mesesDec e mesesRest são calculados a partir de datas de forma independente e,
    // sozinhos, podem somar 11 em vez dos 12 de vigencia_meses (perde 1 mês no
    // arredondamento). Por isso mesesRest é sempre derivado de mesesTot − mesesDec,
    // garantindo que a soma bata exatamente com a vigência real do contrato.
    const mesesDec = Math.max(1, Math.min(mesesTot, mesesCalendario(c.inicio, hoje.toISOString())));
    const mesesRest = Math.max(0, mesesTot - mesesDec);
    const media = it.qtd_acum/mesesDec;
    const proj = Math.round(media*mesesRest);
    // qtd_total_contratada é a fonte confiável quando preenchida (evita ambiguidade
    // de contratos onde qtd_mensal na verdade guarda o total do período, não a taxa mensal).
    const qtdTot = it.qtd_total_contratada || (it.qtd_mensal*mesesTot);
    const saldo = Math.round(qtdTot-it.qtd_acum);
    const dif = Math.round(saldo-proj);
    // Taxa mensal real para o gatilho de supressão: quando qtd_total_contratada existe,
    // é ela dividida pelos meses de vigência — não o campo qtd_mensal cru, que em vários
    // contratos ainda guarda o valor antigo (o mesmo bug do saldo, só que aqui afetaria
    // o gatilho de supressão em vez do saldo).
    const mensalReal = it.qtd_total_contratada ? (it.qtd_total_contratada/mesesTot) : it.qtd_mensal;
    const acao = dif<-1?'ADITIVO':dif>mensalReal*2?'SUPRESSÃO':'OK';
    // Dias até o saldo zerar no ritmo atual (para alerta de 30 dias de antecedência)
    const diasAteZerar = media>0 ? Math.floor((saldo/media)*30) : 9999;
    return { acao, dif, saldo, proj, media, diasAteZerar, qtdTot };
  };

  // Contratos que precisam de atenção: financeiro OU quantitativo, com 30+ dias de antecedência
  const contratosPrecisamAtencao = () => {
    const setIds = new Set();
    contratos.forEach(c => {
      const p = pct(c);
      const d = dias(c.fim);
      const saldoRestante = c.vlr_total - c.consumo_acum;
      const mesesRest = Math.max(0.1, d/30);
      const consumoMedioMes = c.consumo_acum / Math.max(1, Math.ceil((new Date()-new Date(c.inicio))/(1000*60*60*24*30)));
      const diasAteZerarFin = consumoMedioMes>0 ? Math.floor((saldoRestante/consumoMedioMes)*30) : 9999;
      // Risco financeiro: vai zerar o saldo em até 30 dias, ou já está >=85%
      if (p >= 85 || (diasAteZerarFin <= 30 && diasAteZerarFin >= 0)) setIds.add(c.id);
      // Risco de prazo contratual
      if (d <= 30) setIds.add(c.id);
      // Risco quantitativo: algum item vai precisar de aditivo/supressão em até 30 dias
      const itensContrato = itens.filter(i => i.contrato_id === c.id);
      itensContrato.forEach(it => {
        const a = calcAnaliseItem(c, it);
        if (a && (a.acao === 'ADITIVO' || (a.acao === 'OK' && a.diasAteZerar <= 30))) setIds.add(c.id);
      });
    });
    return setIds;
  };

  const renderPainel = () => {
    const ativos = contratos.filter(c => c.status !== 'vencido').length;
    const vencidos = contratos.filter(c => c.status === 'vencido').length;
    const pVenc = contratos.filter(c => { const d = dias(c.fim); return d >= 0 && d <= 90; }).length;
    const precisamAtencao = contratosPrecisamAtencao();
    const adi = aditivos.filter(a => a.status === 'Em análise').length;

    // Status de medição por contrato: compara o último mês medido com o mês atual.
    const mesAtual = todayMonth();
    const [anoAtual, mesAtualNum] = mesAtual.split('-').map(Number);
    const statusMedicoes = contratos.map(c => {
      const execsContrato = execucoes.filter(e => e.contrato_id === c.id);
      const ultimoMes = execsContrato.length ? execsContrato.map(e=>e.mes_referencia).sort().slice(-1)[0] : null;
      let mesesAtraso = null, cls = 'vermelho', label = 'Nunca medido';
      if (ultimoMes) {
        const [uy, um] = ultimoMes.split('-').map(Number);
        mesesAtraso = (anoAtual - uy) * 12 + (mesAtualNum - um);
        // O mês vigente só é medido no início do mês seguinte — por isso "em dia"
        // é ter medido até o mês anterior (mesesAtraso 0 ou 1), não o mês atual.
        if (mesesAtraso <= 1) { cls='verde'; label='Em dia'; }
        else if (mesesAtraso === 2) { cls='amarelo'; label='Atenção · 1 mês atrasado'; }
        else { cls='vermelho'; label=`Atrasada · ${mesesAtraso-1} meses`; }
      }
      return { contrato:c, ultimoMes, mesesAtraso, cls, label };
    }).sort((a,b) => (b.mesesAtraso??99) - (a.mesesAtraso??99));
    const atrasadas = statusMedicoes.filter(s => s.cls==='vermelho').length;
    const pendentes = statusMedicoes.filter(s => s.cls==='amarelo').length;
    const emDia = statusMedicoes.filter(s => s.cls==='verde').length;

    return (
      <>
        <div className="cards-grid">
          {[
            {cls:'verde', val:ativos, label:'Contratos ativos', sub:`de ${contratos.length} total`},
            {cls:pVenc>0?'amarelo':'verde', val:pVenc, label:'Próximos do vencimento', sub:'≤ 90 dias'},
            {cls:precisamAtencao.size>0?'laranja':'verde', val:precisamAtencao.size, label:'Precisam de aditivo/supressão', sub:'valor ou quantidade ≤ 30 dias'},
            {cls:vencidos>0?'vermelho':'verde', val:vencidos, label:'Contratos vencidos', sub:'necessitam ação'},
            {cls:'azul', val:adi, label:'Aditivos em análise', sub:'pendentes de aprovação'},
          ].map((card,i) => (
            <div key={i} className={`stat-card ${card.cls}`}>
              <div className="s-val">{card.val}</div>
              <div className="s-label">{card.label}</div>
              <div className="s-sub">{card.sub}</div>
            </div>
          ))}
        </div>

        <div className="panel">
          <div className="panel-head">
            <h2><i className="fa-solid fa-calendar-check"/> Status das medições por empresa</h2>
            <div style={{display:'flex',gap:6}}>
              <span className="badge verde">✓ {emDia} em dia</span>
              {pendentes>0 && <span className="badge amarelo">{pendentes} aguardando</span>}
              {atrasadas>0 && <span className="badge vermelho">⚠ {atrasadas} atrasada(s)</span>}
            </div>
          </div>
          <div className="tbl-wrap">
            <table>
              <thead><tr><th>Empresa</th><th>Contrato</th><th>Última medição</th><th>Status</th><th></th></tr></thead>
              <tbody>{statusMedicoes.map(s => (
                <tr key={s.contrato.id}>
                  <td style={{maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.contrato.empresa}</td>
                  <td className="mono"><strong>{s.contrato.numero}</strong></td>
                  <td className="cell-m">{s.ultimoMes ? mesToPT(s.ultimoMes) : '—'}</td>
                  <td><Badge cls={s.cls} label={s.label} /></td>
                  <td><button className="btn btn-secondary btn-sm" onClick={()=>{ setMedicaoContrato(s.contrato.id); setSection('medicao'); }}>Lançar medição</button></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>

        {precisamAtencao.size > 0 && (
          <div className="panel">
            <div className="panel-head">
              <h2><i className="fa-solid fa-triangle-exclamation" style={{color:'#f97316'}}/> Contratos que precisam de atenção</h2>
              <button className="btn btn-secondary btn-sm" onClick={() => setSection('aditivos')}>Ver análise completa →</button>
            </div>
            <div className="panel-body" style={{paddingTop:8}}>
              {contratos.filter(c => precisamAtencao.has(c.id)).map(c => {
                const d = dias(c.fim);
                const p = pct(c);
                return (
                  <div key={c.id} className="deadline-item">
                    <div><div className="dl-name">{c.numero} · {c.empresa?.substring(0,28)}</div>
                      <div className="dl-emp">
                        {d<=30 && `Vence em ${d}d`}
                        {p>=85 && ` · ${p}% consumido`}
                      </div>
                    </div>
                    <button className="btn btn-secondary btn-sm" onClick={() => { setSelQtd(c.id); setSection('quantidade'); }}>Ver detalhes</button>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {(() => {
          // Consumo mensal agregado (todas as execuções, últimos 12 meses com dado)
          const porMes = {};
          execucoes.forEach(e => { porMes[e.mes_referencia] = (porMes[e.mes_referencia]||0) + (e.valor||0); });
          const mesesOrdenados = Object.keys(porMes).sort().slice(-12);
          const labelsMesCurtos = mesesOrdenados.map(m => { const [y,mm]=m.split('-'); const nomes=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']; return nomes[parseInt(mm)-1]+'/'+y.substring(2); });
          const dataMes = mesesOrdenados.map(m => porMes[m]);

          const statusCounts = {};
          contratos.forEach(c => { statusCounts[c.status] = (statusCounts[c.status]||0)+1; });
          const statusLabelMap = { vigente:'Vigente', proximo:'Próx. vencimento', vencido:'Vencido', 'em renovacao':'Em renovação' };
          const statusLabels = Object.keys(statusCounts).map(s => statusLabelMap[s]||s);
          const statusData = Object.values(statusCounts);
          const statusColors = Object.keys(statusCounts).map(s => s==='vigente'?'#22c55e':s==='vencido'?'#ef4444':s==='proximo'?'#f59e0b':'#178DBB');

          const topConsumo = contratos.slice().map(c=>({numero:c.numero,p:pct(c)})).sort((a,b)=>b.p-a.p).slice(0,6);

          // Comparativo % prazo decorrido vs % valor consumido — mostra quais contratos
          // estão gastando mais rápido do que o tempo de vigência permitiria.
          const comparativoPrazoValor = contratos.map(c => {
            if (!c.inicio || !c.fim) return null;
            const ini = new Date(c.inicio), fim = new Date(c.fim), hoje = new Date();
            const totalDias = fim - ini;
            if (totalDias <= 0) return null;
            const decorridoDias = Math.min(Math.max(hoje-ini, 0), totalDias);
            const pPrazo = Math.round((decorridoDias/totalDias)*100);
            const pValor = pct(c);
            return { numero:c.numero, empresa:(c.empresa||'').split(' ')[0], pPrazo, pValor, gap: pValor-pPrazo };
          }).filter(Boolean).sort((a,b)=>b.gap-a.gap).slice(0,6);

          return (
            <div className="cards-grid" style={{gridTemplateColumns:'repeat(auto-fit,minmax(320px,1fr))'}}>
              <div className="panel" style={{margin:0}}>
                <div className="panel-head"><h2><i className="fa-solid fa-chart-line"/> Consumo mensal (todos os contratos)</h2></div>
                <div className="panel-body">
                  {dataMes.length ? <LineChart labels={labelsMesCurtos} data={dataMes} color="#1D9E75" /> : <div className="empty" style={{padding:'20px 0'}}><i className="fa-solid fa-chart-line"/>Ainda sem medições registradas</div>}
                </div>
              </div>
              <div className="panel" style={{margin:0}}>
                <div className="panel-head"><h2><i className="fa-solid fa-chart-pie"/> Contratos por status</h2></div>
                <div className="panel-body">
                  {statusLabels.length ? <DoughnutChart labels={statusLabels} data={statusData} colors={statusColors} /> : <div className="empty" style={{padding:'20px 0'}}>Sem contratos</div>}
                </div>
              </div>
              <div className="panel" style={{margin:0}}>
                <div className="panel-head"><h2><i className="fa-solid fa-gauge-high"/> Contratos consumindo mais rápido que o prazo</h2></div>
                <div className="panel-body">
                  <div style={{fontSize:11.5,color:'var(--text3)',marginBottom:6}}>Barra clara = % do prazo já passado · barra escura = % do valor já gasto. Quando a escura passa da clara, o contrato está gastando mais rápido do que deveria.</div>
                  {comparativoPrazoValor.length ? <ComparativoPrazoValorChart labels={comparativoPrazoValor.map(t=>`${t.numero} ${t.empresa}`)} prazo={comparativoPrazoValor.map(t=>t.pPrazo)} valor={comparativoPrazoValor.map(t=>t.pValor)} /> : <div className="empty" style={{padding:'20px 0'}}>Sem contratos com data de início/fim cadastradas</div>}
                </div>
              </div>
            </div>
          );
        })()}

        <div className="panel">
          <div className="panel-head"><h2><i className="fa-solid fa-hourglass-half" /> Prazos de todos os contratos</h2></div>
          <div className="panel-body" style={{paddingTop:4}}>
            {contratos.slice().sort((a,b) => dias(a.fim) - dias(b.fim)).map(c => (
              <div key={c.id} className="deadline-item">
                <div><div className="dl-name">{c.numero}</div><div className="dl-emp">{c.empresa?.substring(0,32)}</div></div>
                <BadgePrazo d={dias(c.fim)} />
              </div>
            ))}
          </div>
        </div>

        <div className="panel">
          <div className="panel-head"><h2><i className="fa-solid fa-table-list" /> Visão geral</h2></div>
          <div className="tbl-wrap">
            <table><thead><tr><th>Nº</th><th>Empresa</th><th>Segmento</th><th>Valor total</th><th>% Consumido</th><th>Saldo</th><th>Prazo</th><th>Status</th></tr></thead>
            <tbody>{contratos.map(c => (
              <tr key={c.id}>
                <td className="mono"><strong>{c.numero}</strong></td>
                <td style={{maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.empresa}</td>
                <td className="cell-m">{c.segmento}</td>
                <td>{brl(c.vlr_total)}</td>
                <td style={{minWidth:120}}><ProgBar p={pct(c)} /></td>
                <td>{brl(c.vlr_total - c.consumo_acum)}</td>
                <td><BadgePrazo d={dias(c.fim)} /></td>
                <td><BadgeStatus s={c.status} /></td>
              </tr>
            ))}</tbody></table>
          </div>
        </div>
      </>
    );
  };

  const renderContratos = () => (
    <div className="panel">
      <div className="panel-head"><h2><i className="fa-solid fa-file-contract" /> Contratos cadastrados</h2>
        <button className="btn btn-primary btn-sm" onClick={() => openModal('novo')}><i className="fa-solid fa-plus" /> Cadastrar</button>
      </div>
      <div className="tbl-wrap">
        <table><thead><tr><th>Nº</th><th>Empresa</th><th>Objeto</th><th>Setor</th><th>Início</th><th>Vencimento</th><th>Vlr mensal</th><th>Vlr total</th><th>Consumo</th><th>Status</th><th></th></tr></thead>
        <tbody>{contratos.map(c => (
          <tr key={c.id}>
            <td className="mono"><strong>{c.numero}</strong></td>
            <td style={{maxWidth:110,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.empresa}</td>
            <td className="cell-m" style={{maxWidth:110,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.objeto}</td>
            <td className="cell-m">{c.setor}</td>
            <td className="cell-m">{fmtD(c.inicio)}</td>
            <td className="cell-m">{fmtD(c.fim)}</td>
            <td>{brl(c.vlr_mensal)}</td>
            <td>{brl(c.vlr_total)}</td>
            <td style={{minWidth:100}}><ProgBar p={pct(c)} /></td>
            <td><BadgeStatus s={c.status} /></td>
            <td>
              <ActBtn icon="fa-eye" onClick={() => openModal('ver', c.id)} title="Ver" />
              <ActBtn icon="fa-pen" onClick={() => openModal('editar', c.id)} title="Editar" />
              <ActBtn icon="fa-trash" onClick={() => excluir('contratos', c.id)} title="Excluir" danger />
            </td>
          </tr>
        ))}</tbody></table>
      </div>
    </div>
  );

  const renderFinanceiro = () => {
    const c = contratos.find(x => x.id === selFin);
    if (!c) return null;
    const p = pct(c), saldo = c.vlr_total - c.consumo_acum;
    const meses = Math.max(1, Math.round(dias(c.fim) / 30));
    const proj = c.vlr_mensal * meses, risco = proj > saldo;
    return (
      <>
        <div className="cards-grid">
          {[
            {label:'Valor total contratado', val:brl(c.vlr_total), cls:''},
            {label:'Valor mensal previsto', val:brl(c.vlr_mensal), cls:''},
            {label:'Valor acumulado executado', val:brl(c.consumo_acum), cls:clsFin(p), sub:`${p}% do total`},
            {label:'Saldo contratual', val:brl(saldo), cls:saldo<c.vlr_mensal*2?'vermelho':saldo<c.vlr_mensal*4?'laranja':'verde'},
          ].map((card,i) => (
            <div key={i} className={`stat-card ${card.cls}`}>
              <div className="s-label" style={{marginBottom:6}}>{card.label}</div>
              <div className="s-val" style={{fontSize:17}}>{card.val}</div>
              {card.sub && <div className="s-sub">{card.sub}</div>}
            </div>
          ))}
        </div>
        <div className="panel">
          <div className="panel-head"><h2><i className="fa-solid fa-chart-line" /> Análise financeira — {c.numero}</h2>
            <button className="btn btn-primary btn-sm" onClick={() => openModal('execucao', c.id)}><i className="fa-solid fa-plus" /> Registrar execução</button>
          </div>
          <div className="panel-body">
            <div style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:12.5}}><span style={{color:'var(--text2)'}}>Percentual consumido</span><strong>{p}%</strong></div>
              <div className="prog-bar" style={{height:11,borderRadius:6}}><div className={`prog-fill ${clsFin(p)}`} style={{width:p+'%'}} /></div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginTop:4}}>
                <span>0%</span><span style={{color:'#f59e0b'}}>70%</span><span style={{color:'#f97316'}}>85%</span><span style={{color:'#ef4444'}}>95%</span><span>100%</span>
              </div>
            </div>
            <AlertBox cls={risco?'vermelho':'verde'} icon={risco?'fa-triangle-exclamation':'fa-circle-check'}>
              <strong>Projeção:</strong> {brl(proj)} nos próximos {meses} mês(es) · Saldo: {brl(saldo)}<br/>
              {risco ? <strong>⚠ Risco de extrapolação — solicitar suplementação</strong> : 'Saldo suficiente para o período restante'}
            </AlertBox>
          </div>
        </div>
      </>
    );
  };

  const renderQuantidade = () => {
    const atualizarRubricaItem = async (itemId, novaRubrica) => {
      await sb().from('itens').update({ rubrica: novaRubrica || null }).eq('id', itemId);
      await loadAll();
    };
    const lista = itens.filter(i => i.contrato_id === selQtd);
    const contrato = contratos.find(c => c.id === selQtd);

    // Análise preditiva por item do contrato
    const analiseContrato = () => {
      if (!contrato || !contrato.inicio || !contrato.fim || !lista.length) return null;
      const hoje = new Date();
      const fimC = new Date(contrato.fim);
      const inicioC = new Date(contrato.inicio);
      const mesesTot = contrato.vigencia_meses || mesesCalendario(contrato.inicio, contrato.fim);
      const mesesDec = Math.max(1, Math.min(mesesTot, mesesCalendario(contrato.inicio, hoje.toISOString())));
      const mesesRest = Math.max(0, mesesTot - mesesDec);
      const analise = lista.map(it => {
        const media = it.qtd_acum/mesesDec;
        const proj = Math.round(media*mesesRest);
        const qtdTot = it.qtd_total_contratada || (it.qtd_mensal*mesesTot);
        const saldo = Math.round(qtdTot-it.qtd_acum);
        const dif = Math.round(saldo-proj);
        const pctAnual = qtdTot>0?Math.min(Math.round((it.qtd_acum/qtdTot)*100),100):0;
        const mensalReal = it.qtd_total_contratada ? (it.qtd_total_contratada/mesesTot) : it.qtd_mensal;
        const acao = dif<-1?'ADITIVO':dif>mensalReal*2?'SUPRESSÃO':'OK';
        return {item:it.item, qtdMensal:it.qtd_mensal, qtdAcum:it.qtd_acum,
          qtdTot:Math.round(qtdTot), saldo, media:media.toFixed(1),
          mesesRest, proj, dif, acao, pctAnual};
      });
      const aditivo = analise.filter(a=>a.acao==='ADITIVO').sort((a,b)=>a.dif-b.dif);
      const supressao = analise.filter(a=>a.acao==='SUPRESSÃO').sort((a,b)=>b.dif-a.dif);
      const ok = analise.filter(a=>a.acao==='OK');
      return (
        <div className="panel" style={{marginTop:14}}>
          <div className="panel-head">
            <h2><i className="fa-solid fa-brain" style={{color:'var(--teal)'}}/>Análise preditiva — {contrato.numero}</h2>
            <div style={{display:'flex',gap:8}}>
              {aditivo.length>0&&<span className="badge vermelho">⚠ {aditivo.length} aditivo(s)</span>}
              {supressao.length>0&&<span className="badge amarelo">↓ {supressao.length} supressão(ões)</span>}
              {ok.length>0&&<span className="badge verde">✓ {ok.length} ok</span>}
            </div>
          </div>
          <div className="panel-body" style={{paddingBottom:6}}>
            <div style={{fontSize:11.5,color:'var(--text2)',marginBottom:10,padding:'8px 10px',background:'var(--gray)',borderRadius:6}}>
              <strong style={{color:'var(--text)'}}>Base do cálculo:</strong> média real de {mesesDec} meses decorridos · {mesesRest} meses restantes até {fmtD(contrato.fim)} · total contratual calculado por item
            </div>
            <div className="tbl-wrap">
              <table>
                <thead><tr><th>Item</th><th>Qtd total contratada</th><th>Acumulado</th><th>Saldo atual</th><th>Média/mês</th><th>Projeção até fim</th><th>Diferença</th><th>% anual</th><th>Recomendação</th></tr></thead>
                <tbody>{analise.map((a,i)=>(
                  <tr key={i} style={{background:a.acao==='ADITIVO'?'#fff5f5':a.acao==='SUPRESSÃO'?'#fffbeb':'transparent'}}>
                    <td style={{maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:11.5}}>{a.item}</td>
                    <td style={{textAlign:'center'}}>{a.qtdTot}</td>
                    <td style={{textAlign:'center'}}>{a.qtdAcum}</td>
                    <td style={{textAlign:'center',fontWeight:600,color:a.saldo<0?'#b91c1c':'var(--text)'}}>{a.saldo}</td>
                    <td style={{textAlign:'center'}}>{a.media}/mês</td>
                    <td style={{textAlign:'center',fontWeight:600}}>{a.proj}</td>
                    <td style={{textAlign:'center',fontWeight:700,color:a.acao==='ADITIVO'?'#b91c1c':a.acao==='SUPRESSÃO'?'#92400e':'#16a34a'}}>
                      {a.dif>0?'+':''}{a.dif}
                    </td>
                    <td style={{minWidth:90}}><ProgBar p={a.pctAnual}/></td>
                    <td>
                      {a.acao==='ADITIVO'&&<span className="badge vermelho">⚠ Solicitar aditivo</span>}
                      {a.acao==='SUPRESSÃO'&&<span className="badge amarelo">↓ Suprimir excedente</span>}
                      {a.acao==='OK'&&<span className="badge verde">✓ Equilibrado</span>}
                    </td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            {aditivo.length>0&&(
              <div style={{marginTop:10,padding:'10px 12px',background:'#fff5f5',borderRadius:6,borderLeft:'3px solid #ef4444'}}>
                <strong style={{fontSize:12,color:'#991b1b'}}>⚠ Itens que precisam de ADITIVO ({aditivo.length}):</strong>
                <ul style={{marginTop:6,paddingLeft:16}}>
                  {aditivo.map((a,i)=><li key={i} style={{fontSize:11.5,color:'#991b1b',marginBottom:3}}>
                    <strong>{a.item}</strong> — faltarão <strong>{Math.abs(a.dif)}</strong> unidades · projeção: {a.proj} · saldo: {a.saldo}
                  </li>)}
                </ul>
                <button className="btn btn-danger btn-sm" style={{marginTop:8}} onClick={()=>openModal('aditivo')}>
                  <i className="fa-solid fa-plus"/> Registrar solicitação de aditivo
                </button>
              </div>
            )}
            {supressao.length>0&&(
              <div style={{marginTop:10,padding:'10px 12px',background:'#fffbeb',borderRadius:6,borderLeft:'3px solid #f59e0b'}}>
                <strong style={{fontSize:12,color:'#92400e'}}>↓ Itens indicados para SUPRESSÃO ({supressao.length}):</strong>
                <ul style={{marginTop:6,paddingLeft:16}}>
                  {supressao.map((a,i)=><li key={i} style={{fontSize:11.5,color:'#92400e',marginBottom:3}}>
                    <strong>{a.item}</strong> — sobrarão <strong>{a.dif}</strong> unidades · projeção: {a.proj} · saldo: {a.saldo}
                  </li>)}
                </ul>
                <button className="btn btn-secondary btn-sm" style={{marginTop:8}} onClick={()=>openModal('aditivo')}>
                  <i className="fa-solid fa-plus"/> Registrar supressão
                </button>
              </div>
            )}
          </div>
        </div>
      );
    };

    if (!lista.length) return (
      <div className="panel">
        <div className="panel-head">
          <h2><i className="fa-solid fa-list-check" /> Itens contratados</h2>
          <button className="btn btn-primary btn-sm" onClick={() => openModal('item', selQtd)}><i className="fa-solid fa-plus" /> Adicionar item</button>
        </div>
        <div className="panel-body">
          <div className="empty">
            <i className="fa-solid fa-boxes-stacked" />
            Nenhum item cadastrado para este contrato.<br/>
            <span style={{fontSize:12,marginTop:6,display:'block'}}>Clique em <strong>"+ Adicionar item"</strong> acima para começar.</span>
          </div>
        </div>
      </div>
    );

    // Contratos de médicos (Radiocom): os 21 itens são fixos pelo Termo Aditivo.
    // Quem executa cada um muda todo mês — isso é lançado em "Medições Mensais",
    // não aqui. Aqui só mostramos referência + saldo/análise preditiva.
    if (contrato && tipoContrato(contrato.numero) === 'medicos') {
      const quadrosOrdenados = [...new Set(lista.slice().sort((a,b)=>(a.ordem||0)-(b.ordem||0)).map(it => it.quadro || 'Outros itens'))];
      return (
        <>
        <div className="cards-grid">
          <div className="stat-card azul"><div className="s-val">{lista.length}</div><div className="s-label">Itens fixos do contrato</div></div>
        </div>
        <div className="panel">
          <div className="panel-body" style={{fontSize:11.5,color:'var(--text2)'}}>
            <i className="fa-solid fa-circle-info"/> Estes 21 itens são fixos pelo Termo Aditivo (só os médicos que os executam mudam mês a mês). Para lançar quem trabalhou, use <strong>Medições Mensais</strong>.
          </div>
        </div>
        {quadrosOrdenados.map(quadroNome => {
          const grupo = lista.filter(it => (it.quadro||'Outros itens') === quadroNome).sort((a,b)=>(a.ordem||0)-(b.ordem||0));
          return (
            <div key={quadroNome} className="panel">
              <div className="panel-head"><h2><i className="fa-solid fa-table-list"/> {quadroNome}</h2></div>
              <div className="tbl-wrap">
                <table>
                  <thead><tr><th>Item</th><th>Carga Horária</th><th>Vaga</th><th>Valor Unitário</th><th>Qtd contratada/mês</th><th>Acumulado (todas medições)</th><th>Rubrica</th></tr></thead>
                  <tbody>{grupo.map(it => (
                    <tr key={it.id}>
                      <td style={{fontWeight:600}}>{it.ordem}. {it.item}</td>
                      <td className="cell-m" style={{textAlign:'center'}}>{it.carga_horaria||'—'}</td>
                      <td className="cell-m" style={{textAlign:'center'}}>{it.vaga||'—'}</td>
                      <td style={{textAlign:'center'}}>{brl(it.vlr_unitario||0)}</td>
                      <td style={{textAlign:'center'}}>{it.qtd_mensal||0}</td>
                      <td style={{textAlign:'center',fontWeight:600}}>{it.qtd_acum||0}</td>
                      <td style={{minWidth:220}}>
                        <select value={it.rubrica||''} onChange={e=>atualizarRubricaItem(it.id, e.target.value)} style={{width:'100%',fontSize:11.5,padding:'4px 6px'}}>
                          <option value="">— Sem rubrica —</option>
                          {RUBRICAS_ORCAMENTARIAS.map(r => <option key={r.cod} value={r.cod}>{r.cod} - {r.desc}</option>)}
                        </select>
                      </td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            </div>
          );
        })}
        {analiseContrato()}
        </>
      );
    }

    return (
      <>
      <div className="panel">
        <div className="panel-head"><h2><i className="fa-solid fa-list-check" /> Itens contratados</h2>
          <button className="btn btn-primary btn-sm" onClick={() => openModal('item', selQtd)}><i className="fa-solid fa-plus" /> Adicionar item</button>
        </div>
        <div style={{fontSize:11.5,color:'var(--text2)',padding:'0 17px 10px'}}>
          <i className="fa-solid fa-circle-info"/> "Saldo real" já considera o total contratado pra toda a vigência (não só o mês) — é o número certo pra saber se precisa de aditivo ou pode suprimir.

  const alocarReequilibrio = (deficit, superavit) => {
    const alocacoes = [];
    const supRestante = superavit.map(s => ({ ...s, valorDisponivel: s.valor }));
    deficit.forEach(d => {
      let valorNecessario = d.valor;
      for (const s of supRestante) {
        if (valorNecessario <= 0.01) break;
        if (s.valorDisponivel <= 0.01) continue;
        if ((d.item.lote || null) !== (s.item.lote || null)) continue;
        const usar = Math.min(valorNecessario, s.valorDisponivel);
        const qtdFalta = d.item.vlr_unitario > 0 ? usar / d.item.vlr_unitario : 0;
        const qtdSobra = s.item.vlr_unitario > 0 ? usar / s.item.vlr_unitario : 0;
        alocacoes.push({ itemFalta: d.item, itemSobra: s.item, valor: usar, qtdFalta, qtdSobra });
        s.valorDisponivel -= usar;
        valorNecessario -= usar;
      }
    });
    return alocacoes;
  };

  const renderAditivos = () => {
    const listaFiltrada = aditivos.filter(a => {
      const c = contratos.find(x => x.id === a.contrato_id);
      const matchContrato = !filtroAditivoContrato || a.contrato_id === filtroAditivoContrato;
      const termo = buscaAditivo.toLowerCase().trim();
      const matchBusca = !termo ||
        c?.numero?.toLowerCase().includes(termo) ||
        c?.empresa?.toLowerCase().includes(termo) ||
        a.tipo?.toLowerCase().includes(termo) ||
        a.justificativa?.toLowerCase().includes(termo) ||
        a.obs?.toLowerCase().includes(termo);
      return matchContrato && matchBusca;
    });

    const contratosComAditivo = contratos.filter(c => aditivos.some(a => a.contrato_id === c.id));

    // Análise de reequilíbrio por contrato: para cada contrato, cruza itens em falta
    // (precisam de aditivo) com itens em sobra (candidatos a supressão) EM VALOR (R$),
    // não em quantidade bruta — itens diferentes têm preços diferentes.
    // Se a sobra cobre a falta → dá pra reequilibrar só remanejando quantidade entre
    // itens do mesmo contrato (Termo de Redistribuição Quantitativa, sem custo extra).
    // Só quando a sobra não é suficiente é que sinaliza necessidade de aditivo real.
    const analiseReequilibrio = contratos.map(c => {
      const itensContrato = itens.filter(i => i.contrato_id === c.id);
      const deficit = [], superavit = [];
      itensContrato.forEach(it => {
        const a = calcAnaliseItem(c, it);
        if (!a) return;
        const valor = Math.abs(a.dif) * (it.vlr_unitario || 0);
        if (a.acao === 'ADITIVO') deficit.push({ item: it, dif: a.dif, valor });
        else if (a.acao === 'SUPRESSÃO') superavit.push({ item: it, dif: a.dif, valor });
      });
      // Só mostra o contrato aqui se ele tiver risco real (algum item em falta).
      // Excedente sozinho, sem risco, não aparece mais — deixa de ser ruído.
      if (!deficit.length) return null;
      const totalFalta = deficit.reduce((acc,d)=>acc+d.valor,0);
      const alocacoes = alocarReequilibrio(deficit, superavit);
      // totalSobra/podeReequilibrar refletem só a sobra que REALMENTE pode cobrir a falta
      // (dentro do mesmo lote) — não a soma bruta de todo excedente do contrato, que
      // pode estar em lote diferente e não pode ser usada pra suprir esse item.
      const totalCobertoPorReequilibrio = alocacoes.reduce((acc,a)=>acc+a.valor,0);
      const totalSobra = superavit.reduce((acc,s)=>acc+s.valor,0);
      const podeReequilibrar = totalCobertoPorReequilibrio >= totalFalta - 0.01;
      const valorAditivoNecessario = Math.max(0, totalFalta - totalCobertoPorReequilibrio);
      // Pra cada item em falta, junta as origens de sobra que já foram apontadas pra cobri-lo
      // (em vez de listar toda a sobra do contrato solta) e o que ainda falta cobrir, se sobrar.
      const deficitComApontamento = deficit.map(d => {
        const origens = alocacoes.filter(a => a.itemFalta.id === d.item.id);
        const totalCoberto = origens.reduce((acc,a)=>acc+a.valor,0);
        const faltaCobrir = Math.max(0, d.valor - totalCoberto);
        return { ...d, origens, faltaCobrir };
      });
      return { contrato:c, deficit:deficitComApontamento, superavit, totalFalta, totalSobra, podeReequilibrar, valorAditivoNecessario };
    }).filter(Boolean);
